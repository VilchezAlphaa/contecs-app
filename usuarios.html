<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CONTECS — Usuarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    .filtros { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .filtro-btn {
      padding: 7px 16px; border-radius: 20px;
      border: 1.5px solid var(--gris-borde);
      background: #fff; font-size: 12px; font-weight: 600;
      cursor: pointer; color: var(--gris-medio);
      transition: var(--transicion); font-family: 'Inter', sans-serif;
      display: flex; align-items: center; gap: 5px;
    }
    .filtro-btn.activo { background: var(--verde); border-color: var(--verde); color: #fff; box-shadow: 0 2px 8px rgba(0,114,46,0.2); }
    .contador { font-size: 13px; color: var(--gris-medio); margin-bottom: 12px; font-weight: 500; }
    .contador strong { color: var(--verde); }

    .usuario-card {
      background: #fff; border-radius: 14px;
      box-shadow: var(--sombra-sm); padding: 14px 16px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
      border-left: 3px solid var(--gris-borde);
      transition: var(--transicion);
      animation: fadeSlideUp 0.25s ease both;
    }
    .usuario-card:hover { box-shadow: var(--sombra-md); }
    .usuario-card.con-rol { border-left-color: var(--verde-claro); }
    .usuario-card.sin-rol { border-left-color: var(--amarillo); }

    .foto {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #045223, #00722e);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; color: #fff; font-weight: 700;
      flex-shrink: 0; overflow: hidden;
    }
    .foto img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .info { flex:1; min-width:0; }
    .info .nombre { font-size:14px; font-weight:700; color:var(--gris-texto); }
    .info .email  { font-size:12px; color:var(--gris-medio); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; }
    .guardando    { font-size:12px; color:var(--verde-claro); margin-top:2px; display:none; font-weight:600; align-items:center; gap:4px; }

    .rol-select {
      padding: 8px 10px; border: 1.5px solid var(--gris-borde);
      border-radius: 10px; font-size: 13px; font-weight: 600;
      font-family: 'Inter', sans-serif; color: var(--gris-texto);
      background: #fff; cursor: pointer; flex-shrink: 0;
      transition: var(--transicion); outline: none;
    }
    .rol-select:focus { border-color: var(--verde); box-shadow: 0 0 0 3px rgba(0,114,46,0.1); }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Usuarios</h1>
    <a href="dashboard.html" class="topbar-back">
      <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Volver
    </a>
  </div>

  <div class="container">
    <div class="card">
      <div class="card-title">
        <svg class="icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Miembros registrados
      </div>
      <p style="font-size:13px;color:var(--gris-medio);margin-bottom:16px;font-weight:500;line-height:1.5;">
        Cada persona que inicia sesión por primera vez aparece aquí. Asígnales su comisión con el selector.
      </p>

      <div class="filtros">
        <button class="filtro-btn activo" data-filtro="todos">
          <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Todos
        </button>
        <button class="filtro-btn" data-filtro="sin_rol">
          <svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Sin rol
        </button>
        <button class="filtro-btn" data-filtro="con_rol">
          <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          Con rol
        </button>
      </div>

      <div class="contador" id="contador">Cargando...</div>
      <div class="spinner-wrap" id="spinner"><div class="spinner"></div></div>
      <div id="lista-usuarios"></div>
    </div>
  </div>

  <script type="module">
    import { guardRoute, getUsuarioActual, requirePermiso } from "./js/auth.js";
    import { ROLES } from "./js/permisos.js";
    import { db } from "./js/firebase-config.js";
    import { collection, onSnapshot, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    guardRoute();
    requirePermiso("gestionar_usuarios");

    let filtroActivo  = "todos";
    let todosUsuarios = [];

    onSnapshot(query(collection(db,"usuarios"), orderBy("creadoEn","desc")), (snap) => {
      todosUsuarios = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      document.getElementById("spinner").style.display = "none";
      renderUsuarios();
    });

    function renderUsuarios() {
      const lista         = document.getElementById("lista-usuarios");
      const usuarioActual = getUsuarioActual();

      let filtrados = todosUsuarios;
      if (filtroActivo === "sin_rol") filtrados = todosUsuarios.filter(u => !u.rol || u.rol === "sin_rol");
      if (filtroActivo === "con_rol") filtrados = todosUsuarios.filter(u => u.rol && u.rol !== "sin_rol");

      const sinRol = todosUsuarios.filter(u => !u.rol || u.rol === "sin_rol").length;
      document.getElementById("contador").innerHTML =
        `<strong>${todosUsuarios.length}</strong> miembros · <strong style="color:${sinRol>0?"var(--amarillo)":"var(--verde-claro)"}">${sinRol}</strong> sin rol asignado`;

      lista.innerHTML = "";

      if (filtrados.length === 0) {
        lista.innerHTML = `<p style="text-align:center;color:var(--gris-medio);padding:24px 0;font-size:14px;font-weight:500;">No hay usuarios en esta categoría.</p>`;
        return;
      }

      filtrados.forEach((usuario, i) => {
        const sinRol  = !usuario.rol || usuario.rol === "sin_rol";
        const esMismo = usuario.id === usuarioActual.uid;
        const inicial = (usuario.nombre || "?")[0].toUpperCase();

        const card = document.createElement("div");
        card.className = `usuario-card ${sinRol ? "sin-rol" : "con-rol"}`;
        card.style.animationDelay = `${i * 0.04}s`;
        card.innerHTML = `
          <div class="foto">
            ${usuario.foto ? `<img src="${usuario.foto}" alt="${inicial}"/>` : inicial}
          </div>
          <div class="info">
            <div class="nombre">
              ${usuario.nombre || "Sin nombre"}
              ${esMismo ? '<span style="font-size:11px;color:var(--verde-claro);font-weight:600;margin-left:4px;">• tú</span>' : ""}
            </div>
            <div class="email">${usuario.email || ""}</div>
            <div class="guardando" id="guardando-${usuario.id}">
              <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              Guardado
            </div>
          </div>
          <select class="rol-select" id="select-${usuario.id}" ${esMismo ? "disabled title='No puedes cambiar tu propio rol'" : ""}>
            <option value="sin_rol" ${sinRol ? "selected" : ""}>Sin rol</option>
            ${Object.entries(ROLES).map(([key, val]) =>
              `<option value="${key}" ${usuario.rol === key ? "selected" : ""}>${val.label}</option>`
            ).join("")}
          </select>`;

        card.querySelector(`#select-${usuario.id}`).addEventListener("change", async (e) => {
          const nuevoRol    = e.target.value;
          const guardandoEl = document.getElementById(`guardando-${usuario.id}`);
          try {
            await updateDoc(doc(db,"usuarios",usuario.id), { rol: nuevoRol });
            guardandoEl.style.display = "flex";
            setTimeout(() => guardandoEl.style.display = "none", 2500);
          } catch(err) {
            alert("Error al guardar. Intenta de nuevo.");
            e.target.value = usuario.rol || "sin_rol";
          }
        });

        lista.appendChild(card);
      });
    }

    document.querySelectorAll(".filtro-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filtro-btn").forEach(b => b.classList.remove("activo"));
        btn.classList.add("activo");
        filtroActivo = btn.dataset.filtro;
        renderUsuarios();
      });
    });
  </script>
</body>
</html>
