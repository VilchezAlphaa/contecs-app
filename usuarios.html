<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CONTECS — Gestión de Usuarios</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    .usuario-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-left: 3px solid #d0dbd2;
      transition: border-color 0.2s;
    }
    .usuario-card.con-rol { border-left-color: #39b54a; }
    .usuario-card.sin-rol { border-left-color: #d4850a; }
    .foto {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #045223, #00722e);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      color: #fff;
      font-weight: 700;
      flex-shrink: 0;
      overflow: hidden;
    }
    .foto img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .info { flex: 1; min-width: 0; }
    .info .nombre { font-size: 14px; font-weight: 600; color: #1a2e1e; }
    .info .email  { font-size: 12px; color: #8a9e8d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rol-select {
      padding: 7px 10px;
      border: 1.5px solid #d0dbd2;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #1a2e1e;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }
    .rol-select:focus { outline: none; border-color: #00722e; }
    .guardando { font-size: 12px; color: #39b54a; margin-top: 2px; display: none; }
    .filtros {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .filtro-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #d0dbd2;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #8a9e8d;
      transition: all 0.15s;
    }
    .filtro-btn.activo {
      background: #00722e;
      border-color: #00722e;
      color: #fff;
    }
    .contador {
      font-size: 13px;
      color: #8a9e8d;
      margin-bottom: 12px;
    }
    .contador strong { color: #00722e; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Gestión de Usuarios</h1>
    <a href="dashboard.html" style="color:#fff;font-size:13px;">← Volver</a>
  </div>

  <div class="container">
    <div class="card">
      <div class="card-title">👥 Miembros registrados</div>
      <p style="font-size:13px;color:#8a9e8d;margin-bottom:16px;">
        Cada persona que inicia sesión por primera vez aparece aquí con rol <strong>Sin rol</strong>. Asígnales su comisión con el selector.
      </p>

      <div class="filtros">
        <button class="filtro-btn activo" data-filtro="todos">Todos</button>
        <button class="filtro-btn" data-filtro="sin_rol">⚠️ Sin rol</button>
        <button class="filtro-btn" data-filtro="con_rol">✅ Con rol</button>
      </div>

      <div class="contador" id="contador">Cargando...</div>

      <div class="spinner-wrap" id="spinner">
        <div class="spinner"></div>
      </div>

      <div id="lista-usuarios"></div>
    </div>
  </div>

  <script type="module">
    import { guardRoute, getUsuarioActual } from "./js/auth.js";
    import { requirePermiso } from "./js/auth.js";
    import { ROLES } from "./js/permisos.js";
    import { db } from "./js/firebase-config.js";
    import {
      collection, onSnapshot, doc, updateDoc, orderBy, query
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    guardRoute();
    requirePermiso("gestionar_usuarios");

    let filtroActivo = "todos";
    let todosUsuarios = [];

    // Escuchar usuarios en tiempo real
    onSnapshot(query(collection(db, "usuarios"), orderBy("creadoEn", "desc")), (snap) => {
      todosUsuarios = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      document.getElementById("spinner").style.display = "none";
      renderUsuarios();
    });

    function renderUsuarios() {
      const lista = document.getElementById("lista-usuarios");
      const usuarioActual = getUsuarioActual();

      let filtrados = todosUsuarios;
      if (filtroActivo === "sin_rol") filtrados = todosUsuarios.filter(u => !u.rol || u.rol === "sin_rol");
      if (filtroActivo === "con_rol") filtrados = todosUsuarios.filter(u => u.rol && u.rol !== "sin_rol");

      const sinRol = todosUsuarios.filter(u => !u.rol || u.rol === "sin_rol").length;
      document.getElementById("contador").innerHTML =
        `<strong>${todosUsuarios.length}</strong> miembros registrados · <strong style="color:${sinRol>0?'#d4850a':'#39b54a'}">${sinRol}</strong> sin rol asignado`;

      lista.innerHTML = "";

      if (filtrados.length === 0) {
        lista.innerHTML = `<p style="text-align:center;color:#8a9e8d;padding:24px 0;font-size:14px;">No hay usuarios en esta categoría.</p>`;
        return;
      }

      filtrados.forEach(usuario => {
        const tieneFoto = usuario.foto && usuario.foto !== "";
        const inicial   = (usuario.nombre || "?")[0].toUpperCase();
        const sinRol    = !usuario.rol || usuario.rol === "sin_rol";
        const esMismo   = usuario.id === usuarioActual.uid;

        const card = document.createElement("div");
        card.className = `usuario-card ${sinRol ? "sin-rol" : "con-rol"}`;
        card.innerHTML = `
          <div class="foto">
            ${tieneFoto ? `<img src="${usuario.foto}" alt="${inicial}"/>` : inicial}
          </div>
          <div class="info">
            <div class="nombre">${usuario.nombre || "Sin nombre"} ${esMismo ? '<span style="font-size:11px;color:#39b54a;">(tú)</span>' : ""}</div>
            <div class="email">${usuario.email || ""}</div>
            <div class="guardando" id="guardando-${usuario.id}">✓ Guardado</div>
          </div>
          <select class="rol-select" id="select-${usuario.id}" ${esMismo ? "disabled" : ""}>
            <option value="sin_rol" ${sinRol ? "selected" : ""}>Sin rol</option>
            ${Object.entries(ROLES).map(([key, val]) =>
              `<option value="${key}" ${usuario.rol === key ? "selected" : ""}>${val.label}</option>`
            ).join("")}
          </select>`;

        const select = card.querySelector(`#select-${usuario.id}`);
        select.addEventListener("change", async () => {
          const nuevoRol    = select.value;
          const guardandoEl = document.getElementById(`guardando-${usuario.id}`);
          try {
            await updateDoc(doc(db, "usuarios", usuario.id), { rol: nuevoRol });
            guardandoEl.style.display = "block";
            setTimeout(() => guardandoEl.style.display = "none", 2000);
          } catch (e) {
            alert("Error al guardar. Intenta de nuevo.");
            select.value = usuario.rol || "sin_rol";
          }
        });

        lista.appendChild(card);
      });
    }

    // Filtros
    document.querySelectorAll(".filtro-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filtro-btn").forEach(b => b.classList.remove("activo"));
        btn.classList.add("activo");
        filtroActivo = btn.dataset.filtro;
        renderUsuarios();
      });
    });
  </script>
</body>
</html>
