<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CONTECS — Inventario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    .alertas-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .alerta-stat {
      background: #fff; border-radius: 14px; padding: 14px 12px;
      text-align: center; box-shadow: var(--sombra-sm);
      transition: var(--transicion);
    }
    .alerta-stat:hover { transform: translateY(-1px); box-shadow: var(--sombra-md); }
    .alerta-stat .num { font-size: 26px; font-weight: 800; line-height: 1; }
    .alerta-stat .lbl { font-size: 11px; color: var(--gris-medio); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .num-ok      { color: var(--verde-claro); }
    .num-alerta  { color: var(--amarillo); }
    .num-agotado { color: var(--rojo); }

    .buscador-wrap { position: relative; margin-bottom: 16px; }
    .buscador-wrap .icon-buscar { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gris-medio); pointer-events: none; }
    .buscador-wrap input { padding-left: 38px; width: 100%; padding-top: 12px; padding-bottom: 12px; border: 1.5px solid var(--gris-borde); border-radius: var(--radio-sm); font-size: 15px; font-family: 'Inter',sans-serif; transition: var(--transicion); outline: none; }
    .buscador-wrap input:focus { border-color: var(--verde); box-shadow: 0 0 0 3px rgba(0,114,46,0.1); }

    .seccion-cat { margin-bottom: 20px; animation: fadeSlideUp 0.3s ease both; }
    .seccion-cat-titulo {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 700; color: var(--verde-oscuro);
      margin-bottom: 10px; padding-bottom: 8px;
      border-bottom: 2px solid var(--verde-fondo);
    }
    .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .inv-card {
      background: #fff; border-radius: 14px; box-shadow: var(--sombra-sm);
      padding: 16px 12px; display: flex; flex-direction: column;
      align-items: center; gap: 6px; text-align: center;
      border-top: 3px solid var(--verde-claro);
      transition: var(--transicion);
      animation: fadeSlideUp 0.25s ease both;
    }
    .inv-card:hover { transform: translateY(-2px); box-shadow: var(--sombra-md); }
    .inv-card.alerta  { border-top-color: var(--amarillo); }
    .inv-card.agotado { border-top-color: var(--rojo); background: var(--rojo-fondo); }
    .inv-emoji  { font-size: 30px; line-height: 1; }
    .inv-nombre { font-size: 12px; font-weight: 600; color: var(--gris-texto); line-height: 1.3; }
    .inv-stock  { font-size: 24px; font-weight: 800; }
    .inv-stock.ok      { color: var(--verde); }
    .inv-stock.alerta  { color: var(--amarillo); }
    .inv-stock.agotado { color: var(--rojo); }
    .inv-lbl { font-size: 10px; color: var(--gris-medio); font-weight: 500; display: flex; align-items: center; gap: 3px; }
    .inv-badge-agotado {
      font-size: 10px; font-weight: 700; color: var(--rojo);
      background: #fff; padding: 2px 8px; border-radius: 10px;
      border: 1px solid var(--rojo); display: flex; align-items: center; gap: 3px;
    }

    .agotados-banner {
      background: var(--rojo-fondo); border: 1.5px solid var(--rojo);
      border-radius: 14px; padding: 16px; margin-bottom: 20px;
      animation: fadeSlideUp 0.3s ease both;
    }
    .agotados-banner-titulo {
      font-size: 13px; font-weight: 700; color: var(--rojo);
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    .agotado-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0; border-top: 1px solid rgba(192,57,43,0.12); font-size: 13px;
    }
    .agotado-item:first-of-type { border-top: none; }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--gris-medio); }
    .empty-icon  { width: 56px; height: 56px; background: var(--gris-suave); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .empty-state p { font-size: 14px; line-height: 1.5; font-weight: 500; }
    .timestamp { text-align: center; font-size: 11px; color: var(--gris-medio); margin-top: 16px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Inventario</h1>
    <a href="dashboard.html" class="topbar-back">
      <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Volver
    </a>
  </div>

  <div class="container">
    <div class="alertas-bar">
      <div class="alerta-stat">
        <div class="num num-ok" id="stat-ok">—</div>
        <div class="lbl">En stock</div>
      </div>
      <div class="alerta-stat">
        <div class="num num-alerta" id="stat-alerta">—</div>
        <div class="lbl">Stock bajo</div>
      </div>
      <div class="alerta-stat">
        <div class="num num-agotado" id="stat-agotado">—</div>
        <div class="lbl">Agotado</div>
      </div>
    </div>

    <div class="buscador-wrap">
      <svg class="icon icon-buscar" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="buscador" placeholder="Buscar producto..."/>
    </div>

    <div class="spinner-wrap" id="spinner-inv"><div class="spinner"></div></div>
    <div id="inv-contenido" style="display:none"></div>
    <div class="timestamp" id="timestamp"></div>
  </div>

  <script type="module">
    import { guardRoute, requirePermiso } from "./js/auth.js";
    import { escucharCategorias, getEmoji, estadoStock } from "./js/catalogo.js";
    import { db } from "./js/firebase-config.js";
    import { collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    guardRoute();
    requirePermiso("ver_inventario");

    let categorias      = [];
    let todosProductos  = [];
    let busq            = "";

    onSnapshot(query(collection(db,"productos"), where("activo","==",true)), (snap) => {
      todosProductos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      actualizarStats();
      renderInventario();
    });

    escucharCategorias((cats) => {
      categorias = cats;
      document.getElementById("spinner-inv").style.display = "none";
      document.getElementById("inv-contenido").style.display = "";
      renderInventario();
    });

    function actualizarStats() {
      let ok = 0, alerta = 0, agotado = 0;
      todosProductos.forEach(p => {
        const e = estadoStock(p.stock??0, p.alertaMinima??0);
        if (e==="ok") ok++; else if (e==="alerta") alerta++; else agotado++;
      });
      document.getElementById("stat-ok").textContent      = ok;
      document.getElementById("stat-alerta").textContent  = alerta;
      document.getElementById("stat-agotado").textContent = agotado;
      document.getElementById("timestamp").textContent    = `Actualizado: ${new Date().toLocaleTimeString("es-PA")}`;
    }

    function renderInventario() {
      const filtro   = busq.toLowerCase();
      const contenido = document.getElementById("inv-contenido");
      contenido.innerHTML = "";

      const agotados = todosProductos.filter(p => estadoStock(p.stock??0,p.alertaMinima??0)==="agotado" && (!filtro||p.nombre.toLowerCase().includes(filtro)));

      if (agotados.length > 0 && !filtro) {
        const banner = document.createElement("div");
        banner.className = "agotados-banner";
        banner.innerHTML = `
          <div class="agotados-banner-titulo">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 22l-4-4"/><path d="M3 7v9a2 2 0 0 0 2 2h5"/><path d="M21 7v5"/><line x1="17" y1="17" x2="21" y2="21"/><line x1="21" y1="17" x2="17" y2="21"/></svg>
            Productos agotados (${agotados.length})
          </div>
          ${agotados.map(p=>`
            <div class="agotado-item">
              <span style="font-size:20px;">${getEmoji(p.iconoId)}</span>
              <span style="font-weight:600;flex:1;">${p.nombre}</span>
              <span class="inv-badge-agotado">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Sin stock
              </span>
            </div>`).join("")}`;
        contenido.appendChild(banner);
      }

      let totalVisible = 0;
      categorias.forEach((cat, ci) => {
        const prods = todosProductos.filter(p =>
          p.categoriaId === cat.id && (!filtro || p.nombre.toLowerCase().includes(filtro))
        );
        if (prods.length === 0) return;
        totalVisible += prods.length;

        const seccion = document.createElement("div");
        seccion.className = "seccion-cat";
        seccion.style.animationDelay = `${ci * 0.05}s`;
        seccion.innerHTML = `
          <div class="seccion-cat-titulo">
            <span style="font-size:20px;">${getEmoji(cat.iconoId)}</span>
            ${cat.nombre}
            <span style="font-size:12px;font-weight:400;color:var(--gris-medio);">(${prods.length})</span>
          </div>
          <div class="inv-grid" id="ig-${cat.id}"></div>`;

        const grid = seccion.querySelector(`#ig-${cat.id}`);
        const ordenados = [...prods].sort((a,b) => {
          const orden = { agotado:0, alerta:1, ok:2 };
          return orden[estadoStock(a.stock??0,a.alertaMinima??0)] - orden[estadoStock(b.stock??0,b.alertaMinima??0)];
        });

        ordenados.forEach((prod, pi) => {
          const estado = estadoStock(prod.stock??0, prod.alertaMinima??0);
          const card = document.createElement("div");
          card.className = `inv-card ${estado !== "ok" ? estado : ""}`;
          card.style.animationDelay = `${(ci * 0.05) + (pi * 0.03)}s`;
          card.innerHTML = `
            <div class="inv-emoji">${getEmoji(prod.iconoId)}</div>
            <div class="inv-nombre">${prod.nombre}</div>
            <div class="inv-stock ${estado}">${estado==="agotado" ? 0 : prod.stock??0}</div>
            <div class="inv-lbl">
              ${estado==="agotado"
                ? `<span class="inv-badge-agotado"><svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Sin stock</span>`
                : estado==="alerta"
                  ? `<svg class="icon icon-sm" viewBox="0 0 24 24" style="color:var(--amarillo)"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Min: ${prod.alertaMinima}`
                  : `Min: ${prod.alertaMinima??0} uds`}
            </div>`;
          grid.appendChild(card);
        });
        contenido.appendChild(seccion);
      });

      if (totalVisible === 0) {
        contenido.innerHTML += `
          <div class="empty-state">
            <div class="empty-icon"><svg class="icon icon-lg" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
            <p>${filtro ? `Sin resultados para "${busq}"` : "No hay productos en el inventario.<br>Crea categorías y productos en el Catálogo."}</p>
          </div>`;
      }
    }

    document.getElementById("buscador").addEventListener("input", e => {
      busq = e.target.value;
      renderInventario();
    });
  </script>
</body>
</html>
