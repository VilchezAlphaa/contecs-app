<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CONTECS — Catálogo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    .tabs {
      display: flex; gap: 4px;
      margin-bottom: 20px;
      background: #fff;
      border-radius: 12px;
      padding: 4px;
      box-shadow: var(--sombra-sm);
    }
    .tab-btn {
      flex: 1; padding: 10px;
      border: none; background: none;
      font-size: 13px; font-weight: 600;
      color: var(--gris-medio); cursor: pointer;
      border-radius: 10px;
      transition: var(--transicion);
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .tab-btn.activo { background: var(--verde); color: #fff; box-shadow: 0 2px 8px rgba(0,114,46,0.25); }

    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .cat-card {
      background: #fff; border-radius: 14px;
      box-shadow: var(--sombra-sm); padding: 16px 14px;
      display: flex; align-items: center; gap: 12px;
      border-left: 3px solid var(--verde-claro);
      transition: var(--transicion);
    }
    .cat-card:hover { box-shadow: var(--sombra-md); transform: translateY(-1px); }
    .cat-emoji { font-size: 28px; line-height: 1; }
    .cat-info  { flex: 1; min-width: 0; }
    .cat-nombre { font-size: 14px; font-weight: 700; color: var(--gris-texto); }
    .cat-count  { font-size: 12px; color: var(--gris-medio); font-weight: 500; }
    .cat-acciones { display: flex; gap: 6px; }

    .btn-icon {
      background: var(--gris-suave); border: none;
      border-radius: 8px; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--gris-medio);
      transition: var(--transicion);
    }
    .btn-icon:hover { background: var(--verde-fondo); color: var(--verde); }
    .btn-icon.danger:hover { background: var(--rojo-fondo); color: var(--rojo); }

    .prod-lista { display: flex; flex-direction: column; gap: 10px; }
    .prod-card {
      background: #fff; border-radius: 12px;
      box-shadow: var(--sombra-sm); padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      transition: var(--transicion);
      animation: fadeSlideUp 0.25s ease both;
    }
    .prod-card:hover { box-shadow: var(--sombra-md); }
    .prod-emoji { font-size: 28px; line-height: 1; flex-shrink: 0; }
    .prod-info  { flex: 1; min-width: 0; }
    .prod-nombre { font-size: 14px; font-weight: 700; color: var(--gris-texto); }
    .prod-detalle { font-size: 12px; color: var(--gris-medio); font-weight: 500; margin-top: 2px; }
    .stock-badge {
      padding: 4px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
      display: flex; align-items: center; gap: 4px;
    }
    .badge-ok     { background: var(--verde-fondo);    color: var(--verde-oscuro); }
    .badge-alerta { background: var(--amarillo-fondo); color: var(--amarillo); }
    .badge-agotado{ background: var(--rojo-fondo);     color: var(--rojo); }
    .prod-inactivo { opacity: 0.4; }

    .agotados-titulo {
      font-size: 12px; font-weight: 700; color: var(--rojo);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin: 16px 0 8px;
      display: flex; align-items: center; gap: 6px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: #fff; border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px;
      width: 100%; max-width: 520px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
      max-height: 88vh; overflow-y: auto;
    }
    .modal-overlay.show .modal { transform: translateY(0); }
    .modal-handle {
      width: 36px; height: 4px; background: var(--gris-borde);
      border-radius: 2px; margin: 0 auto 20px;
    }
    .modal-titulo {
      font-size: 16px; font-weight: 700; color: var(--verde-oscuro);
      margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .btn-cerrar-modal {
      background: var(--gris-suave); border: none; border-radius: 50%;
      width: 32px; height: 32px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--gris-medio); transition: var(--transicion);
    }
    .btn-cerrar-modal:hover { background: var(--rojo-fondo); color: var(--rojo); }

    /* Galería iconos */
    .icono-galeria {
      display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-top: 8px;
    }
    .icono-opcion {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 10px 4px; border-radius: 12px;
      border: 2px solid transparent; cursor: pointer;
      transition: var(--transicion); background: var(--gris-suave);
    }
    .icono-opcion:hover  { border-color: var(--verde-claro); background: var(--verde-fondo); }
    .icono-opcion.seleccionado { border-color: var(--verde); background: var(--verde-fondo); box-shadow: 0 0 0 3px rgba(0,114,46,0.1); }
    .icono-opcion .emoji { font-size: 22px; }
    .icono-opcion .lbl   { font-size: 9px; color: var(--gris-medio); text-align: center; line-height: 1.2; font-weight: 500; }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--gris-medio); }
    .empty-state .icon-wrap { width: 56px; height: 56px; background: var(--gris-suave); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .empty-state p { font-size: 14px; line-height: 1.5; font-weight: 500; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Catálogo</h1>
    <a href="dashboard.html" class="topbar-back">
      <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Volver
    </a>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn activo" data-tab="categorias">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Categorías
      </button>
      <button class="tab-btn" data-tab="productos">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        Productos
      </button>
    </div>

    <!-- TAB CATEGORÍAS -->
    <div id="tab-categorias">
      <div class="alerta alerta-error"   id="cat-error" ></div>
      <div class="alerta alerta-success" id="cat-ok"    ></div>
      <button class="btn btn-primary" id="btn-nueva-cat" style="margin-bottom:16px;">
        <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva categoría
      </button>
      <div class="spinner-wrap" id="cat-spinner"><div class="spinner"></div></div>
      <div class="cat-grid" id="cat-grid"></div>
      <div class="empty-state" id="cat-empty" style="display:none">
        <div class="icon-wrap"><svg class="icon icon-lg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div>
        <p>No hay categorías aún.<br>Crea la primera con el botón de arriba.</p>
      </div>
    </div>

    <!-- TAB PRODUCTOS -->
    <div id="tab-productos" style="display:none">
      <div class="alerta alerta-error"   id="prod-error"></div>
      <div class="alerta alerta-success" id="prod-ok"   ></div>
      <div class="form-group">
        <label>Filtrar por categoría</label>
        <select id="filtro-cat">
          <option value="">— Selecciona una categoría —</option>
        </select>
      </div>
      <div id="productos-contenido">
        <div class="empty-state">
          <div class="icon-wrap"><svg class="icon icon-lg" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
          <p>Selecciona una categoría<br>para ver sus productos.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL CATEGORÍA -->
  <div class="modal-overlay" id="modal-cat">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-titulo">
        <span id="modal-cat-titulo">Nueva categoría</span>
        <button class="btn-cerrar-modal" id="cerrar-modal-cat">
          <svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="form-group">
        <label>Nombre de la categoría</label>
        <input type="text" id="cat-nombre-input" placeholder="Ej: Bebidas, Comida, Dulces..."/>
      </div>
      <div class="form-group">
        <label>Icono de la categoría</label>
        <div class="icono-galeria" id="galeria-cat"></div>
      </div>
      <input type="hidden" id="cat-icono-sel"/>
      <input type="hidden" id="cat-edit-id"/>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="btn-guardar-cat">
          <svg class="icon" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Guardar
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL PRODUCTO -->
  <div class="modal-overlay" id="modal-prod">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-titulo">
        <span id="modal-prod-titulo">Nuevo producto</span>
        <button class="btn-cerrar-modal" id="cerrar-modal-prod">
          <svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="form-group">
        <label>Nombre del producto</label>
        <input type="text" id="prod-nombre-input" placeholder="Ej: Coca-Cola 600ml, Hamburguesa sencilla..."/>
      </div>
      <div class="form-group">
        <label>Precio de venta ($)</label>
        <input type="number" id="prod-precio-input" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <div class="form-group">
        <label>Alerta mínima de stock</label>
        <input type="number" id="prod-alerta-input" placeholder="Ej: 10" min="0" step="1"/>
        <small style="color:var(--gris-medio);font-size:12px;margin-top:4px;display:block;font-weight:500;">
          El producto se resaltará en amarillo cuando quede esta cantidad o menos.
        </small>
      </div>
      <div class="form-group">
        <label>Icono del producto</label>
        <div class="icono-galeria" id="galeria-prod"></div>
      </div>
      <input type="hidden" id="prod-icono-sel"/>
      <input type="hidden" id="prod-edit-id"/>
      <input type="hidden" id="prod-cat-id"/>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="btn-guardar-prod">
          <svg class="icon" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Guardar producto
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL CONFIRMAR -->
  <div class="modal-overlay" id="modal-confirm">
    <div class="modal" style="padding-bottom:32px;">
      <div class="modal-handle"></div>
      <div class="modal-titulo">
        <span>Confirmar acción</span>
        <button class="btn-cerrar-modal" id="cerrar-modal-confirm">
          <svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <p id="confirm-mensaje" style="font-size:14px;color:var(--gris-texto);margin-bottom:20px;line-height:1.5;font-weight:500;"></p>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-danger" id="btn-confirm-ok">
          <svg class="icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Confirmar
        </button>
        <button class="btn btn-outline" id="btn-confirm-cancel">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { guardRoute, requirePermiso } from "./js/auth.js";
    import {
      ICONOS_CATEGORIA, ICONOS_PRODUCTO, getEmoji,
      escucharCategorias, crearCategoria, editarCategoria, eliminarCategoria,
      escucharProductosPorCategoria, crearProducto, editarProducto,
      desactivarProducto, reactivarProducto, estadoStock
    } from "./js/catalogo.js";

    guardRoute();
    requirePermiso("editar_catalogo");

    // ── TABS
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("activo"));
        btn.classList.add("activo");
        document.getElementById("tab-categorias").style.display = btn.dataset.tab === "categorias" ? "" : "none";
        document.getElementById("tab-productos").style.display  = btn.dataset.tab === "productos"  ? "" : "none";
      });
    });

    let categorias     = [];
    let unsubProductos = null;
    let confirmCb      = null;

    function alerta(id, msg, tipo = "error") {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className   = `alerta alerta-${tipo} show`;
      setTimeout(() => el.classList.remove("show"), 3500);
    }
    function abrirModal(id)  { document.getElementById(id).classList.add("show"); }
    function cerrarModal(id) { document.getElementById(id).classList.remove("show"); }

    function renderGaleria(containerId, inputId, esProducto = false) {
      const container = document.getElementById(containerId);
      const iconos    = esProducto ? ICONOS_PRODUCTO : ICONOS_CATEGORIA;
      container.innerHTML = "";
      iconos.forEach(ic => {
        const div = document.createElement("div");
        div.className = "icono-opcion";
        div.dataset.id = ic.id;
        div.innerHTML  = `<span class="emoji">${ic.emoji}</span><span class="lbl">${ic.label}</span>`;
        div.addEventListener("click", () => {
          container.querySelectorAll(".icono-opcion").forEach(d => d.classList.remove("seleccionado"));
          div.classList.add("seleccionado");
          document.getElementById(inputId).value = ic.id;
        });
        container.appendChild(div);
      });
    }

    function selectIcono(containerId, inputId, iconoId) {
      document.getElementById(inputId).value = iconoId;
      document.querySelectorAll(`#${containerId} .icono-opcion`).forEach(d => {
        d.classList.toggle("seleccionado", d.dataset.id === iconoId);
      });
    }

    // ── CATEGORÍAS
    escucharCategorias((cats) => {
      categorias = cats;
      document.getElementById("cat-spinner").style.display = "none";

      const filtroCat = document.getElementById("filtro-cat");
      filtroCat.innerHTML = '<option value="">— Selecciona una categoría —</option>';
      cats.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = `${getEmoji(c.iconoId)} ${c.nombre}`;
        filtroCat.appendChild(opt);
      });

      const grid  = document.getElementById("cat-grid");
      const empty = document.getElementById("cat-empty");
      grid.innerHTML = "";

      if (cats.length === 0) { empty.style.display = "block"; return; }
      empty.style.display = "none";

      cats.forEach(cat => {
        const card = document.createElement("div");
        card.className = "cat-card";
        card.innerHTML = `
          <div class="cat-emoji">${getEmoji(cat.iconoId)}</div>
          <div class="cat-info">
            <div class="cat-nombre">${cat.nombre}</div>
            <div class="cat-count" id="cc-${cat.id}">...</div>
          </div>
          <div class="cat-acciones">
            <button class="btn-icon" data-edit="${cat.id}" title="Editar">
              <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn-icon danger" data-del="${cat.id}" title="Eliminar">
              <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </div>`;

        escucharProductosPorCategoria(cat.id, (prods) => {
          const el = document.getElementById(`cc-${cat.id}`);
          if (el) {
            const n = prods.filter(p => p.activo !== false).length;
            el.textContent = `${n} producto${n !== 1 ? "s" : ""}`;
          }
        });

        card.querySelector(`[data-edit]`).addEventListener("click", () => {
          document.getElementById("modal-cat-titulo").textContent = "Editar categoría";
          document.getElementById("cat-nombre-input").value = cat.nombre;
          document.getElementById("cat-edit-id").value      = cat.id;
          renderGaleria("galeria-cat", "cat-icono-sel", false);
          setTimeout(() => selectIcono("galeria-cat", "cat-icono-sel", cat.iconoId), 50);
          abrirModal("modal-cat");
        });

        card.querySelector(`[data-del]`).addEventListener("click", () => {
          abrirConfirm(`¿Eliminar la categoría "${cat.nombre}"? Solo es posible si no tiene productos activos.`, async () => {
            try { await eliminarCategoria(cat.id); alerta("cat-ok", "Categoría eliminada.", "success"); }
            catch(e) { alerta("cat-error", e.message); }
          });
        });

        grid.appendChild(card);
      });
    });

    document.getElementById("btn-nueva-cat").addEventListener("click", () => {
      document.getElementById("modal-cat-titulo").textContent = "Nueva categoría";
      document.getElementById("cat-nombre-input").value = "";
      document.getElementById("cat-icono-sel").value   = "";
      document.getElementById("cat-edit-id").value     = "";
      renderGaleria("galeria-cat", "cat-icono-sel", false);
      abrirModal("modal-cat");
    });

    document.getElementById("btn-guardar-cat").addEventListener("click", async () => {
      const nombre  = document.getElementById("cat-nombre-input").value.trim();
      const iconoId = document.getElementById("cat-icono-sel").value;
      const editId  = document.getElementById("cat-edit-id").value;
      if (!nombre)  { alerta("cat-error", "Escribe un nombre para la categoría."); return; }
      if (!iconoId) { alerta("cat-error", "Selecciona un icono para la categoría."); return; }
      try {
        if (editId) { await editarCategoria(editId, nombre, iconoId); alerta("cat-ok", "Categoría actualizada.", "success"); }
        else        { await crearCategoria(nombre, iconoId);           alerta("cat-ok", "Categoría creada.", "success"); }
        cerrarModal("modal-cat");
      } catch(e) { alerta("cat-error", "Error al guardar. Intenta de nuevo."); }
    });

    document.getElementById("cerrar-modal-cat").addEventListener("click", () => cerrarModal("modal-cat"));

    // ── PRODUCTOS
    document.getElementById("filtro-cat").addEventListener("change", (e) => {
      if (unsubProductos) unsubProductos();
      const catId   = e.target.value;
      const cont    = document.getElementById("productos-contenido");
      if (!catId) {
        cont.innerHTML = `<div class="empty-state"><div class="icon-wrap"><svg class="icon icon-lg" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div><p>Selecciona una categoría.</p></div>`;
        return;
      }
      const cat = categorias.find(c => c.id === catId);
      cont.innerHTML = `
        <button class="btn btn-primary" id="btn-nuevo-prod" style="margin-bottom:16px;">
          <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Agregar producto${cat ? ` a ${cat.nombre}` : ""}
        </button>
        <div class="spinner-wrap" id="prod-spinner"><div class="spinner"></div></div>
        <div id="agotados-sec"></div>
        <div class="prod-lista" id="prod-lista"></div>
        <div class="empty-state" id="prod-empty" style="display:none">
          <div class="icon-wrap"><svg class="icon icon-lg" viewBox="0 0 24 24"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
          <p>No hay productos en esta categoría.<br>Agrega el primero.</p>
        </div>`;

      document.getElementById("btn-nuevo-prod").addEventListener("click", () => {
        document.getElementById("modal-prod-titulo").textContent = "Nuevo producto";
        document.getElementById("prod-nombre-input").value = "";
        document.getElementById("prod-precio-input").value = "";
        document.getElementById("prod-alerta-input").value = "";
        document.getElementById("prod-icono-sel").value    = "";
        document.getElementById("prod-edit-id").value      = "";
        document.getElementById("prod-cat-id").value       = catId;
        renderGaleria("galeria-prod", "prod-icono-sel", true);
        abrirModal("modal-prod");
      });

      unsubProductos = escucharProductosPorCategoria(catId, (prods) => {
        document.getElementById("prod-spinner").style.display = "none";
        const lista      = document.getElementById("prod-lista");
        const agotadosSec= document.getElementById("agotados-sec");
        const empty      = document.getElementById("prod-empty");
        lista.innerHTML = ""; agotadosSec.innerHTML = "";

        const activos   = prods.filter(p => p.activo !== false);
        const inactivos = prods.filter(p => p.activo === false);
        const agotados  = activos.filter(p => (p.stock??0) <= 0);
        const normales  = activos.filter(p => (p.stock??0) > 0);

        if (activos.length === 0 && inactivos.length === 0) { empty.style.display = "block"; return; }
        empty.style.display = "none";

        if (agotados.length > 0) {
          agotadosSec.innerHTML = `<div class="agotados-titulo"><svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Sin stock (${agotados.length})</div>`;
          agotados.forEach(p => agotadosSec.appendChild(mkProdCard(p)));
        }
        normales.forEach(p => lista.appendChild(mkProdCard(p)));

        if (inactivos.length > 0) {
          const sep = document.createElement("div");
          sep.className = "agotados-titulo";
          sep.style.color = "var(--gris-medio)";
          sep.innerHTML = `<svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg> Desactivados (${inactivos.length})`;
          lista.appendChild(sep);
          inactivos.forEach(p => lista.appendChild(mkProdCard(p, true)));
        }
      });
    });

    function mkProdCard(prod, inactivo = false) {
      const estado = estadoStock(prod.stock??0, prod.alertaMinima??0);
      const badgeClass = { ok:"badge-ok", alerta:"badge-alerta", agotado:"badge-agotado" }[estado];
      const badgeText  = { ok:`${prod.stock}`, alerta:`${prod.stock}`, agotado:"Sin stock" }[estado];
      const badgeIcon  = {
        ok:     `<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M16 16l2 2 4-4"/><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14"/></svg>`,
        alerta: `<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
        agotado:`<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M12 22l-4-4"/><path d="M3 7v9a2 2 0 0 0 2 2h5"/><path d="M21 7v5"/><line x1="17" y1="17" x2="21" y2="21"/><line x1="21" y1="17" x2="17" y2="21"/></svg>`,
      }[estado];

      const card = document.createElement("div");
      card.className = `prod-card${inactivo ? " prod-inactivo" : ""}`;
      card.innerHTML = `
        <div class="prod-emoji">${getEmoji(prod.iconoId)}</div>
        <div class="prod-info">
          <div class="prod-nombre">${prod.nombre}</div>
          <div class="prod-detalle">$${(prod.precioVenta??0).toLocaleString("es-PA",{minimumFractionDigits:2})} · Alerta: ${prod.alertaMinima??0} uds</div>
        </div>
        <span class="stock-badge ${badgeClass}">${badgeIcon}${badgeText}</span>
        <div class="cat-acciones">
          <button class="btn-icon" title="Editar">
            <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon ${inactivo ? "" : "danger"}" title="${inactivo ? "Reactivar" : "Desactivar"}">
            ${inactivo
              ? `<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`
              : `<svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>`}
          </button>
        </div>`;

      card.querySelectorAll(".btn-icon")[0].addEventListener("click", () => {
        document.getElementById("modal-prod-titulo").textContent = "Editar producto";
        document.getElementById("prod-nombre-input").value = prod.nombre;
        document.getElementById("prod-precio-input").value = prod.precioVenta ?? "";
        document.getElementById("prod-alerta-input").value = prod.alertaMinima ?? "";
        document.getElementById("prod-edit-id").value      = prod.id;
        document.getElementById("prod-cat-id").value       = prod.categoriaId;
        renderGaleria("galeria-prod", "prod-icono-sel", true);
        setTimeout(() => selectIcono("galeria-prod", "prod-icono-sel", prod.iconoId), 50);
        abrirModal("modal-prod");
      });

      card.querySelectorAll(".btn-icon")[1].addEventListener("click", () => {
        if (inactivo) {
          abrirConfirm(`¿Reactivar "${prod.nombre}"?`, async () => {
            await reactivarProducto(prod.id);
            alerta("prod-ok", "Producto reactivado.", "success");
          });
        } else {
          abrirConfirm(`¿Desactivar "${prod.nombre}"? Sus datos históricos se conservan.`, async () => {
            await desactivarProducto(prod.id);
            alerta("prod-ok", "Producto desactivado.", "success");
          });
        }
      });
      return card;
    }

    document.getElementById("btn-guardar-prod").addEventListener("click", async () => {
      const nombre      = document.getElementById("prod-nombre-input").value.trim();
      const precio      = parseFloat(document.getElementById("prod-precio-input").value);
      const alrtMin     = parseInt(document.getElementById("prod-alerta-input").value);
      const iconoId     = document.getElementById("prod-icono-sel").value;
      const editId      = document.getElementById("prod-edit-id").value;
      const categoriaId = document.getElementById("prod-cat-id").value;
      if (!nombre)       { alerta("prod-error", "Escribe el nombre del producto."); return; }
      if (isNaN(precio)) { alerta("prod-error", "Escribe un precio válido."); return; }
      if (!iconoId)      { alerta("prod-error", "Selecciona un icono para el producto."); return; }
      const datos = { nombre, precioVenta: precio, alertaMinima: isNaN(alrtMin)?0:alrtMin, iconoId, categoriaId };
      try {
        if (editId) { await editarProducto(editId, datos); alerta("prod-ok", "Producto actualizado.", "success"); }
        else        { await crearProducto(datos);           alerta("prod-ok", "Producto creado. El stock inicia en 0 — regístralo con una compra.", "success"); }
        cerrarModal("modal-prod");
      } catch(e) { alerta("prod-error", "Error al guardar. Intenta de nuevo."); }
    });

    document.getElementById("cerrar-modal-prod").addEventListener("click", () => cerrarModal("modal-prod"));

    function abrirConfirm(msg, cb) {
      document.getElementById("confirm-mensaje").textContent = msg;
      confirmCb = cb;
      abrirModal("modal-confirm");
    }
    document.getElementById("btn-confirm-ok").addEventListener("click", async () => {
      if (confirmCb) await confirmCb();
      cerrarModal("modal-confirm"); confirmCb = null;
    });
    document.getElementById("btn-confirm-cancel").addEventListener("click", () => { cerrarModal("modal-confirm"); confirmCb = null; });
    document.getElementById("cerrar-modal-confirm").addEventListener("click", () => { cerrarModal("modal-confirm"); confirmCb = null; });

    ["modal-cat","modal-prod","modal-confirm"].forEach(id => {
      document.getElementById(id).addEventListener("click", e => {
        if (e.target.id === id) cerrarModal(id);
      });
    });
  </script>
</body>
</html>
