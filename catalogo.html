<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CONTECS — Catálogo</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--gris-borde);
      padding-bottom: 0;
    }
    .tab-btn {
      padding: 10px 18px;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--gris-medio);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.activo {
      color: var(--verde);
      border-bottom-color: var(--verde);
    }

    /* ── CATEGORÍAS ── */
    .cat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .cat-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: var(--sombra-sm);
      padding: 16px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 3px solid var(--verde-claro);
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.12s;
    }
    .cat-card:hover { box-shadow: var(--sombra-md); transform: translateY(-1px); }
    .cat-card.seleccionada { border-left-color: var(--verde-oscuro); background: var(--verde-fondo); }
    .cat-emoji { font-size: 28px; line-height: 1; }
    .cat-info { flex: 1; min-width: 0; }
    .cat-nombre { font-size: 14px; font-weight: 600; color: var(--gris-texto); }
    .cat-count  { font-size: 12px; color: var(--gris-medio); }
    .cat-acciones { display: flex; gap: 6px; }
    .btn-icon {
      background: none;
      border: 1px solid var(--gris-borde);
      border-radius: 8px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 14px;
      transition: background 0.15s;
    }
    .btn-icon:hover { background: var(--verde-fondo); }
    .btn-icon.danger:hover { background: var(--rojo-fondo); border-color: var(--rojo); }

    /* ── PRODUCTOS ── */
    .prod-lista { display: flex; flex-direction: column; gap: 10px; }
    .prod-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: var(--sombra-sm);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .prod-emoji { font-size: 28px; line-height: 1; flex-shrink: 0; }
    .prod-info  { flex: 1; min-width: 0; }
    .prod-nombre { font-size: 14px; font-weight: 600; color: var(--gris-texto); }
    .prod-precio { font-size: 12px; color: var(--gris-medio); }
    .stock-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .stock-ok     { background: var(--verde-fondo); color: var(--verde-oscuro); }
    .stock-alerta { background: var(--amarillo-fondo); color: var(--amarillo); }
    .stock-agotado{ background: var(--rojo-fondo); color: var(--rojo); }
    .prod-inactivo { opacity: 0.45; }

    /* Sección agotados */
    .agotados-titulo {
      font-size: 12px;
      font-weight: 700;
      color: var(--rojo);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 520px;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-overlay.show .modal { transform: translateY(0); }
    .modal-titulo {
      font-size: 16px;
      font-weight: 700;
      color: var(--verde-oscuro);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .btn-cerrar-modal {
      background: var(--gris-suave);
      border: none;
      border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── GALERÍA DE ICONOS ── */
    .icono-galeria {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 8px;
    }
    .icono-opcion {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 4px;
      border-radius: 10px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--gris-suave);
    }
    .icono-opcion:hover { border-color: var(--verde-claro); }
    .icono-opcion.seleccionado { border-color: var(--verde); background: var(--verde-fondo); }
    .icono-opcion .emoji { font-size: 22px; }
    .icono-opcion .label { font-size: 9px; color: var(--gris-medio); text-align: center; line-height: 1.2; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--gris-medio);
    }
    .empty-state .emoji { font-size: 40px; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Catálogo</h1>
    <a href="dashboard.html" style="color:#fff;font-size:13px;">← Volver</a>
  </div>

  <div class="container">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn activo" data-tab="categorias">🗂️ Categorías</button>
      <button class="tab-btn" data-tab="productos">📦 Productos</button>
    </div>

    <!-- ══ TAB: CATEGORÍAS ══ -->
    <div id="tab-categorias">
      <div class="alerta alerta-error  show" id="cat-error"  style="display:none"></div>
      <div class="alerta alerta-success" id="cat-ok"  style="display:none"></div>

      <button class="btn btn-primary" id="btn-nueva-cat" style="margin-bottom:16px;">
        + Nueva categoría
      </button>

      <div class="spinner-wrap" id="cat-spinner"><div class="spinner"></div></div>
      <div class="cat-grid" id="cat-grid"></div>
      <div class="empty-state" id="cat-empty" style="display:none">
        <div class="emoji">🗂️</div>
        <p>No hay categorías aún.<br>Crea la primera con el botón de arriba.</p>
      </div>
    </div>

    <!-- ══ TAB: PRODUCTOS ══ -->
    <div id="tab-productos" style="display:none">
      <div class="alerta alerta-error"   id="prod-error" style="display:none"></div>
      <div class="alerta alerta-success" id="prod-ok"    style="display:none"></div>

      <!-- Selector de categoría -->
      <div class="form-group">
        <label>Filtrar por categoría</label>
        <select id="filtro-cat">
          <option value="">— Selecciona una categoría —</option>
        </select>
      </div>

      <div id="productos-contenido">
        <div class="empty-state">
          <div class="emoji">☝️</div>
          <p>Selecciona una categoría para ver sus productos.</p>
        </div>
      </div>
    </div>

  </div>

  <!-- ══ MODAL CATEGORÍA ══ -->
  <div class="modal-overlay" id="modal-cat">
    <div class="modal">
      <div class="modal-titulo">
        <span id="modal-cat-titulo">Nueva categoría</span>
        <button class="btn-cerrar-modal" id="cerrar-modal-cat">✕</button>
      </div>
      <div class="form-group">
        <label>Nombre de la categoría</label>
        <input type="text" id="cat-nombre-input" placeholder="Ej: Bebidas, Comida, Dulces..."/>
      </div>
      <div class="form-group">
        <label>Selecciona un icono</label>
        <div class="icono-galeria" id="galeria-cat"></div>
      </div>
      <div id="cat-icono-error" style="color:var(--rojo);font-size:13px;margin-bottom:10px;display:none">
        Selecciona un icono.
      </div>
      <input type="hidden" id="cat-icono-sel"/>
      <input type="hidden" id="cat-edit-id"/>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button class="btn btn-primary" id="btn-guardar-cat">Guardar categoría</button>
      </div>
    </div>
  </div>

  <!-- ══ MODAL PRODUCTO ══ -->
  <div class="modal-overlay" id="modal-prod">
    <div class="modal">
      <div class="modal-titulo">
        <span id="modal-prod-titulo">Nuevo producto</span>
        <button class="btn-cerrar-modal" id="cerrar-modal-prod">✕</button>
      </div>
      <div class="form-group">
        <label>Nombre del producto</label>
        <input type="text" id="prod-nombre-input" placeholder="Ej: Coca-Cola 600ml"/>
      </div>
      <div class="form-group">
        <label>Precio de venta (₡)</label>
        <input type="number" id="prod-precio-input" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <div class="form-group">
        <label>Alerta mínima de stock</label>
        <input type="number" id="prod-alerta-input" placeholder="Ej: 10" min="0" step="1"/>
        <small style="color:var(--gris-medio);font-size:12px;">
          🟡 El producto se pondrá en amarillo cuando queden esta cantidad o menos.
        </small>
      </div>
      <div class="form-group">
        <label>Selecciona un icono</label>
        <div class="icono-galeria" id="galeria-prod"></div>
      </div>
      <input type="hidden" id="prod-icono-sel"/>
      <input type="hidden" id="prod-edit-id"/>
      <input type="hidden" id="prod-cat-id"/>
      <div style="display:flex;gap:10px;margin-top:12px;">
        <button class="btn btn-primary" id="btn-guardar-prod">Guardar producto</button>
      </div>
    </div>
  </div>

  <!-- ══ MODAL CONFIRMAR ELIMINAR ══ -->
  <div class="modal-overlay" id="modal-confirm">
    <div class="modal" style="padding-bottom:28px;">
      <div class="modal-titulo">
        <span>⚠️ Confirmar acción</span>
        <button class="btn-cerrar-modal" id="cerrar-modal-confirm">✕</button>
      </div>
      <p id="confirm-mensaje" style="font-size:14px;color:var(--gris-texto);margin-bottom:20px;"></p>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-danger" id="btn-confirm-ok">Confirmar</button>
        <button class="btn btn-outline" id="btn-confirm-cancel">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { guardRoute, requirePermiso } from "./js/auth.js";
    import {
      ICONOS, TODOS_ICONOS, getEmoji,
      escucharCategorias, crearCategoria, editarCategoria, eliminarCategoria,
      escucharProductosPorCategoria, crearProducto, editarProducto,
      desactivarProducto, reactivarProducto, estadoStock
    } from "./js/catalogo.js";

    guardRoute();
    requirePermiso("editar_catalogo");

    // ── TABS ─────────────────────────────────────────────────────────────────
    const tabs = document.querySelectorAll(".tab-btn");
    tabs.forEach(btn => {
      btn.addEventListener("click", () => {
        tabs.forEach(b => b.classList.remove("activo"));
        btn.classList.add("activo");
        document.getElementById("tab-categorias").style.display = btn.dataset.tab === "categorias" ? "" : "none";
        document.getElementById("tab-productos").style.display  = btn.dataset.tab === "productos"  ? "" : "none";
      });
    });

    // ── ESTADO LOCAL ─────────────────────────────────────────────────────────
    let categorias      = [];
    let unsubProductos  = null;
    let confirmCallback = null;

    // ── HELPERS UI ───────────────────────────────────────────────────────────
    function mostrarAlerta(id, msg, tipo = "error") {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className   = `alerta alerta-${tipo}`;
      el.style.display = "block";
      setTimeout(() => el.style.display = "none", 3500);
    }

    function abrirModal(id)  { document.getElementById(id).classList.add("show"); }
    function cerrarModal(id) { document.getElementById(id).classList.remove("show"); }

    // Galería de iconos genérica
    function renderGaleria(containerId, inputId, grupo = null) {
      const container = document.getElementById(containerId);
      const iconos    = grupo ? (ICONOS[grupo] || TODOS_ICONOS) : TODOS_ICONOS;
      container.innerHTML = "";
      iconos.forEach(icono => {
        const div = document.createElement("div");
        div.className   = "icono-opcion";
        div.dataset.id  = icono.id;
        div.innerHTML   = `<span class="emoji">${icono.emoji}</span><span class="label">${icono.label}</span>`;
        div.addEventListener("click", () => {
          container.querySelectorAll(".icono-opcion").forEach(d => d.classList.remove("seleccionado"));
          div.classList.add("seleccionado");
          document.getElementById(inputId).value = icono.id;
        });
        container.appendChild(div);
      });
    }

    function seleccionarIconoEnGaleria(containerId, inputId, iconoId) {
      document.getElementById(inputId).value = iconoId;
      document.querySelectorAll(`#${containerId} .icono-opcion`).forEach(d => {
        d.classList.toggle("seleccionado", d.dataset.id === iconoId);
      });
    }

    // ── CATEGORÍAS ───────────────────────────────────────────────────────────
    const catGrid    = document.getElementById("cat-grid");
    const catEmpty   = document.getElementById("cat-empty");
    const catSpinner = document.getElementById("cat-spinner");
    const filtroCat  = document.getElementById("filtro-cat");

    escucharCategorias((cats) => {
      categorias = cats;
      catSpinner.style.display = "none";
      catGrid.innerHTML = "";

      // Actualizar selector de categorías en tab productos
      filtroCat.innerHTML = '<option value="">— Selecciona una categoría —</option>';
      cats.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = `${getEmoji(c.iconoId)} ${c.nombre}`;
        filtroCat.appendChild(opt);
      });

      if (cats.length === 0) {
        catEmpty.style.display = "block";
        return;
      }
      catEmpty.style.display = "none";

      cats.forEach(cat => {
        const card = document.createElement("div");
        card.className = "cat-card";
        card.innerHTML = `
          <div class="cat-emoji">${getEmoji(cat.iconoId)}</div>
          <div class="cat-info">
            <div class="cat-nombre">${cat.nombre}</div>
            <div class="cat-count" id="count-${cat.id}">Cargando...</div>
          </div>
          <div class="cat-acciones">
            <button class="btn-icon" data-edit="${cat.id}" title="Editar">✏️</button>
            <button class="btn-icon danger" data-del="${cat.id}" title="Eliminar">🗑️</button>
          </div>`;

        // Contar productos activos
        import("./js/catalogo.js").then(({ escucharProductosPorCategoria }) => {
          escucharProductosPorCategoria(cat.id, (prods) => {
            const countEl = document.getElementById(`count-${cat.id}`);
            if (countEl) {
              const activos = prods.filter(p => p.activo !== false).length;
              countEl.textContent = `${activos} producto${activos !== 1 ? "s" : ""}`;
            }
          });
        });

        // Editar
        card.querySelector(`[data-edit="${cat.id}"]`).addEventListener("click", (e) => {
          e.stopPropagation();
          abrirModalEditarCat(cat);
        });

        // Eliminar
        card.querySelector(`[data-del="${cat.id}"]`).addEventListener("click", (e) => {
          e.stopPropagation();
          abrirConfirm(
            `¿Eliminar la categoría "${cat.nombre}"? Solo se puede eliminar si no tiene productos activos.`,
            async () => {
              try {
                await eliminarCategoria(cat.id);
                mostrarAlerta("cat-ok", "Categoría eliminada.", "success");
              } catch(err) {
                mostrarAlerta("cat-error", err.message);
              }
            }
          );
        });

        catGrid.appendChild(card);
      });
    });

    // Modal nueva categoría
    document.getElementById("btn-nueva-cat").addEventListener("click", () => {
      document.getElementById("modal-cat-titulo").textContent = "Nueva categoría";
      document.getElementById("cat-nombre-input").value = "";
      document.getElementById("cat-icono-sel").value   = "";
      document.getElementById("cat-edit-id").value     = "";
      renderGaleria("galeria-cat", "cat-icono-sel");
      abrirModal("modal-cat");
    });

    function abrirModalEditarCat(cat) {
      document.getElementById("modal-cat-titulo").textContent = "Editar categoría";
      document.getElementById("cat-nombre-input").value = cat.nombre;
      document.getElementById("cat-edit-id").value      = cat.id;
      renderGaleria("galeria-cat", "cat-icono-sel");
      setTimeout(() => seleccionarIconoEnGaleria("galeria-cat", "cat-icono-sel", cat.iconoId), 50);
      abrirModal("modal-cat");
    }

    document.getElementById("btn-guardar-cat").addEventListener("click", async () => {
      const nombre  = document.getElementById("cat-nombre-input").value.trim();
      const iconoId = document.getElementById("cat-icono-sel").value;
      const editId  = document.getElementById("cat-edit-id").value;

      if (!nombre) { mostrarAlerta("cat-error", "Escribe un nombre para la categoría."); return; }
      if (!iconoId) { document.getElementById("cat-icono-error").style.display = "block"; return; }
      document.getElementById("cat-icono-error").style.display = "none";

      try {
        if (editId) {
          await editarCategoria(editId, nombre, iconoId);
          mostrarAlerta("cat-ok", "Categoría actualizada correctamente.", "success");
        } else {
          await crearCategoria(nombre, iconoId);
          mostrarAlerta("cat-ok", "Categoría creada correctamente.", "success");
        }
        cerrarModal("modal-cat");
      } catch(e) {
        mostrarAlerta("cat-error", "Error al guardar. Intenta de nuevo.");
      }
    });

    document.getElementById("cerrar-modal-cat").addEventListener("click", () => cerrarModal("modal-cat"));

    // ── PRODUCTOS ────────────────────────────────────────────────────────────
    filtroCat.addEventListener("change", () => {
      const catId = filtroCat.value;
      if (!unsubProductos) {} else unsubProductos();
      const contenido = document.getElementById("productos-contenido");

      if (!catId) {
        contenido.innerHTML = `<div class="empty-state"><div class="emoji">☝️</div><p>Selecciona una categoría.</p></div>`;
        return;
      }

      const cat = categorias.find(c => c.id === catId);
      contenido.innerHTML = `
        <button class="btn btn-primary" id="btn-nuevo-prod" style="margin-bottom:16px;">
          + Agregar producto a ${cat ? cat.nombre : ""}
        </button>
        <div class="spinner-wrap" id="prod-spinner"><div class="spinner"></div></div>
        <div id="agotados-section"></div>
        <div class="prod-lista" id="prod-lista"></div>
        <div class="empty-state" id="prod-empty" style="display:none">
          <div class="emoji">📦</div>
          <p>No hay productos en esta categoría.<br>Agrega el primero con el botón de arriba.</p>
        </div>`;

      document.getElementById("btn-nuevo-prod").addEventListener("click", () => {
        abrirModalNuevoProd(catId);
      });

      unsubProductos = escucharProductosPorCategoria(catId, (prods) => {
        document.getElementById("prod-spinner").style.display = "none";
        const lista      = document.getElementById("prod-lista");
        const agotadosSec= document.getElementById("agotados-section");
        const empty      = document.getElementById("prod-empty");

        lista.innerHTML       = "";
        agotadosSec.innerHTML = "";

        const activos   = prods.filter(p => p.activo !== false);
        const inactivos = prods.filter(p => p.activo === false);
        const agotados  = activos.filter(p => p.stock <= 0);
        const normales  = activos.filter(p => p.stock > 0);

        if (activos.length === 0 && inactivos.length === 0) {
          empty.style.display = "block";
          return;
        }
        empty.style.display = "none";

        // Primero los agotados en rojo
        if (agotados.length > 0) {
          agotadosSec.innerHTML = `<div class="agotados-titulo">🔴 Sin stock (${agotados.length})</div>`;
          agotados.forEach(p => agotadosSec.appendChild(renderProductoCard(p)));
        }

        // Luego los normales y en alerta
        normales.forEach(p => lista.appendChild(renderProductoCard(p)));

        // Al final los desactivados
        if (inactivos.length > 0) {
          const sep = document.createElement("div");
          sep.className = "agotados-titulo";
          sep.style.color = "var(--gris-medio)";
          sep.textContent = `⚫ Desactivados (${inactivos.length})`;
          lista.appendChild(sep);
          inactivos.forEach(p => lista.appendChild(renderProductoCard(p, true)));
        }
      });
    });

    function renderProductoCard(prod, inactivo = false) {
      const estado = estadoStock(prod.stock ?? 0, prod.alertaMinima ?? 0);
      const badgeClass = { ok: "stock-ok", alerta: "stock-alerta", agotado: "stock-agotado" }[estado];
      const badgeText  = { ok: `✅ ${prod.stock}`, alerta: `⚠️ ${prod.stock}`, agotado: "🔴 Agotado" }[estado];

      const card = document.createElement("div");
      card.className = `prod-card${inactivo ? " prod-inactivo" : ""}`;
      card.innerHTML = `
        <div class="prod-emoji">${getEmoji(prod.iconoId)}</div>
        <div class="prod-info">
          <div class="prod-nombre">${prod.nombre}</div>
          <div class="prod-precio">₡${(prod.precioVenta ?? 0).toLocaleString("es-CR", {minimumFractionDigits:2})} · Alerta: ${prod.alertaMinima ?? 0} uds</div>
        </div>
        <span class="stock-badge ${badgeClass}">${badgeText}</span>
        <div class="cat-acciones">
          <button class="btn-icon" data-edit-prod="${prod.id}" title="Editar">✏️</button>
          <button class="btn-icon ${inactivo ? "" : "danger"}" data-toggle-prod="${prod.id}" title="${inactivo ? "Reactivar" : "Desactivar"}">${inactivo ? "✅" : "🚫"}</button>
        </div>`;

      card.querySelector(`[data-edit-prod]`).addEventListener("click", () => {
        abrirModalEditarProd(prod);
      });

      card.querySelector(`[data-toggle-prod]`).addEventListener("click", () => {
        if (inactivo) {
          abrirConfirm(`¿Reactivar "${prod.nombre}"? Volverá a aparecer en ventas y compras.`, async () => {
            await reactivarProducto(prod.id);
            mostrarAlerta("prod-ok", "Producto reactivado.", "success");
          });
        } else {
          abrirConfirm(`¿Desactivar "${prod.nombre}"? Dejará de aparecer en ventas y compras, pero sus datos históricos se conservan.`, async () => {
            await desactivarProducto(prod.id);
            mostrarAlerta("prod-ok", "Producto desactivado.", "success");
          });
        }
      });

      return card;
    }

    function abrirModalNuevoProd(catId) {
      document.getElementById("modal-prod-titulo").textContent = "Nuevo producto";
      document.getElementById("prod-nombre-input").value = "";
      document.getElementById("prod-precio-input").value = "";
      document.getElementById("prod-alerta-input").value = "";
      document.getElementById("prod-icono-sel").value    = "";
      document.getElementById("prod-edit-id").value      = "";
      document.getElementById("prod-cat-id").value       = catId;
      renderGaleria("galeria-prod", "prod-icono-sel");
      abrirModal("modal-prod");
    }

    function abrirModalEditarProd(prod) {
      document.getElementById("modal-prod-titulo").textContent = "Editar producto";
      document.getElementById("prod-nombre-input").value = prod.nombre;
      document.getElementById("prod-precio-input").value = prod.precioVenta ?? "";
      document.getElementById("prod-alerta-input").value = prod.alertaMinima ?? "";
      document.getElementById("prod-edit-id").value      = prod.id;
      document.getElementById("prod-cat-id").value       = prod.categoriaId;
      renderGaleria("galeria-prod", "prod-icono-sel");
      setTimeout(() => seleccionarIconoEnGaleria("galeria-prod", "prod-icono-sel", prod.iconoId), 50);
      abrirModal("modal-prod");
    }

    document.getElementById("btn-guardar-prod").addEventListener("click", async () => {
      const nombre      = document.getElementById("prod-nombre-input").value.trim();
      const precio      = parseFloat(document.getElementById("prod-precio-input").value);
      const alerta      = parseInt(document.getElementById("prod-alerta-input").value);
      const iconoId     = document.getElementById("prod-icono-sel").value;
      const editId      = document.getElementById("prod-edit-id").value;
      const categoriaId = document.getElementById("prod-cat-id").value;

      if (!nombre)           { mostrarAlerta("prod-error", "Escribe el nombre del producto."); return; }
      if (isNaN(precio))     { mostrarAlerta("prod-error", "Escribe un precio válido."); return; }
      if (!iconoId)          { mostrarAlerta("prod-error", "Selecciona un icono."); return; }

      const datos = {
        nombre,
        precioVenta:  precio,
        alertaMinima: isNaN(alerta) ? 0 : alerta,
        iconoId,
        categoriaId,
      };

      try {
        if (editId) {
          await editarProducto(editId, datos);
          mostrarAlerta("prod-ok", "Producto actualizado.", "success");
        } else {
          await crearProducto(datos);
          mostrarAlerta("prod-ok", "Producto creado con stock inicial en 0. Registra una compra para añadir stock.", "success");
        }
        cerrarModal("modal-prod");
      } catch(e) {
        mostrarAlerta("prod-error", "Error al guardar. Intenta de nuevo.");
      }
    });

    document.getElementById("cerrar-modal-prod").addEventListener("click", () => cerrarModal("modal-prod"));

    // ── MODAL CONFIRMAR ──────────────────────────────────────────────────────
    function abrirConfirm(mensaje, callback) {
      document.getElementById("confirm-mensaje").textContent = mensaje;
      confirmCallback = callback;
      abrirModal("modal-confirm");
    }

    document.getElementById("btn-confirm-ok").addEventListener("click", async () => {
      if (confirmCallback) await confirmCallback();
      cerrarModal("modal-confirm");
      confirmCallback = null;
    });

    document.getElementById("btn-confirm-cancel").addEventListener("click", () => {
      cerrarModal("modal-confirm");
      confirmCallback = null;
    });

    document.getElementById("cerrar-modal-confirm").addEventListener("click", () => {
      cerrarModal("modal-confirm");
      confirmCallback = null;
    });

    // Cerrar modales tocando el overlay
    ["modal-cat", "modal-prod", "modal-confirm"].forEach(id => {
      document.getElementById(id).addEventListener("click", (e) => {
        if (e.target === document.getElementById(id)) cerrarModal(id);
      });
    });
  </script>
</body>
</html>
