<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CONTECS — Ajustes de Inventario</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    .ajuste-resumen {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--sombra-sm);
      margin-bottom: 16px;
      border-left: 3px solid var(--verde-claro);
    }
    .ajuste-resumen .lbl { font-size: 12px; color: var(--gris-medio); margin-bottom: 4px; }
    .ajuste-resumen .val { font-size: 18px; font-weight: 800; color: var(--verde-oscuro); }
    .ajuste-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .ajuste-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: var(--sombra-sm);
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 3px solid var(--verde-claro);
      cursor: pointer;
      width: 100%;
      text-align: left;
    }
    .ajuste-card.seleccionado { border-left-color: var(--verde-oscuro); background: var(--verde-fondo); }
    .ajuste-icono { font-size: 28px; line-height: 1; }
    .ajuste-info { flex: 1; min-width: 0; }
    .ajuste-nombre { font-weight: 700; color: var(--gris-texto); }
    .ajuste-meta { font-size: 12px; color: var(--gris-medio); }
    .seccion-cat { margin-bottom: 18px; }
    .seccion-cat-titulo { display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--verde-oscuro); margin-bottom: 10px; }
    @media (min-width: 680px) {
      .ajuste-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Ajustes de Inventario</h1>
    <a href="dashboard.html" class="topbar-link">← Volver</a>
  </div>
  <div class="container">
    <div class="alerta alerta-error" id="alerta-ajustes"></div>

    <div class="ajuste-resumen">
      <div class="lbl">Producto seleccionado</div>
      <div class="val" id="producto-seleccionado">Ninguno</div>
    </div>

    <div class="card">
      <div class="card-title">Buscar producto</div>
      <div class="form-group">
        <input type="text" id="buscador-ajustes" placeholder="Buscar por nombre..."/>
      </div>
      <div id="lista-ajustes"></div>
    </div>

    <div class="card">
      <div class="card-title">Registrar ajuste</div>
      <form id="form-ajuste">
        <div class="form-group">
          <label for="tipo-ajuste">Tipo de movimiento</label>
          <select id="tipo-ajuste" aria-label="Tipo de movimiento de inventario">
            <option value="entrada">Entrada</option>
            <option value="salida">Salida</option>
          </select>
        </div>
        <div class="form-group">
          <label>Cantidad</label>
          <input type="number" id="cantidad-ajuste" min="1" step="1" placeholder="1"/>
        </div>
        <div class="form-group">
          <label>Motivo</label>
          <textarea id="motivo-ajuste" rows="3" placeholder="Razón del ajuste"></textarea>
        </div>
        <button class="btn btn-primary" id="btn-ajustar-stock" type="submit">Registrar ajuste</button>
      </form>
    </div>
  </div>
  <script type="module" src="./js/ajustes.js"></script>
</body>
</html>
