<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CONTECS — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(160deg, #1A5676 0%, #2980B9 100%);
    }
    .login-box {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 36px 28px 32px;
      width: 100%;
      max-width: 380px;
      margin: 16px;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-area .logo-circle {
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, #1A5676, #2980B9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 28px;
    }
    .logo-area h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1A5676;
      letter-spacing: 1px;
    }
    .logo-area p {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }
    .btn-login {
      background: linear-gradient(135deg, #1A5676, #2980B9);
      color: #fff;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      min-height: 48px;
    }
    .btn-login:active { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo-area">
      <div class="logo-circle">🏛️</div>
      <h2>CONTECS</h2>
      <p>Sistema de Gestión Organizacional</p>
    </div>

    <div class="alert alert-error" id="error-msg"></div>

    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" id="btn-login">Ingresar</button>
  </div>

  <script type="module">
    import { loginUsuario, guardRoute } from "./js/auth.js";

    guardRoute();

    const btnLogin  = document.getElementById("btn-login");
    const errorMsg  = document.getElementById("error-msg");

    function mostrarError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add("show");
    }

    btnLogin.addEventListener("click", async () => {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        mostrarError("Por favor ingresa tu correo y contraseña.");
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = "Ingresando...";
      errorMsg.classList.remove("show");

      try {
        await loginUsuario(email, password);
        window.location.href = "dashboard.html";
      } catch (e) {
        btnLogin.disabled = false;
        btnLogin.textContent = "Ingresar";
        if (e.code === "auth/invalid-credential" || e.code === "auth/wrong-password") {
          mostrarError("Correo o contraseña incorrectos.");
        } else if (e.code === "auth/user-not-found") {
          mostrarError("No existe una cuenta con ese correo.");
        } else if (e.code === "auth/too-many-requests") {
          mostrarError("Demasiados intentos. Espera unos minutos.");
        } else {
          mostrarError("Error al iniciar sesión. Intenta de nuevo.");
        }
      }
    });

    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") btnLogin.click();
    });
  </script>
</body>
</html>
