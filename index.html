<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CONTECS — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(160deg, #1A5676 0%, #2980B9 100%);
    }
    .login-box {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 40px 28px 36px;
      width: 100%;
      max-width: 380px;
      margin: 16px;
      text-align: center;
    }
    .logo-circle {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #1A5676, #2980B9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      font-size: 30px;
    }
    .login-box h2 { font-size: 24px; font-weight: 700; color: #1A5676; letter-spacing: 1px; margin-bottom: 4px; }
    .subtitulo { font-size: 13px; color: #888; margin-bottom: 32px; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 14px 20px;
      border: 1.5px solid #D5D8DC; border-radius: 10px;
      background: #fff; font-size: 15px; font-weight: 500; color: #2C3E50;
      cursor: pointer; transition: background 0.15s, box-shadow 0.15s; min-height: 52px;
    }
    .btn-google:hover { background: #F8F9FA; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .btn-google:disabled { opacity: 0.6; cursor: not-allowed; }
    .nota { font-size: 12px; color: #aaa; margin-top: 24px; line-height: 1.5; }
    .alerta {
      padding: 10px 14px; border-radius: 8px; font-size: 13px;
      margin-bottom: 16px; display: none; text-align: left;
    }
    .alerta.show { display: block; }
    .alerta-error   { background: #FDEDEC; color: #C0392B; border-left: 4px solid #C0392B; }
    .alerta-aviso   { background: #FEF9E7; color: #9A7D0A; border-left: 4px solid #F39C12; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo-circle">🏛️</div>
    <h2>CONTECS</h2>
    <p class="subtitulo">Sistema de Gestión Organizacional</p>

    <div class="alerta alerta-error" id="msg-error"></div>
    <div class="alerta alerta-aviso" id="msg-aviso"></div>

    <button class="btn-google" id="btn-google">
      <svg width="20" height="20" viewBox="0 0 48 48" style="flex-shrink:0">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continuar con Google
    </button>

    <p class="nota">Solo miembros de CONTECS con acceso asignado<br>pueden ingresar al sistema.</p>
  </div>

  <script type="module">
    import { loginConGoogle, guardRoute } from "./js/auth.js";

    guardRoute();

    const btn      = document.getElementById("btn-google");
    const msgError = document.getElementById("msg-error");
    const msgAviso = document.getElementById("msg-aviso");

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      btn.lastChild.textContent = " Conectando...";
      msgError.classList.remove("show");
      msgAviso.classList.remove("show");

      try {
        await loginConGoogle();
        const rol = sessionStorage.getItem("rol");
        if (rol === "sin_rol") {
          msgAviso.textContent = "Tu cuenta fue reconocida, pero aún no tienes un rol asignado. Contacta al administrador de CONTECS.";
          msgAviso.classList.add("show");
          btn.disabled = false;
          btn.lastChild.textContent = " Continuar con Google";
          return;
        }
        window.location.href = "dashboard.html";
      } catch (e) {
        btn.disabled = false;
        btn.lastChild.textContent = " Continuar con Google";
        if (e.code === "auth/popup-closed-by-user") return;
        if (e.code === "auth/popup-blocked") {
          msgError.textContent = "El navegador bloqueó la ventana emergente. Permite popups para este sitio e intenta de nuevo.";
        } else {
          msgError.textContent = "Error al iniciar sesión. Intenta de nuevo.";
        }
        msgError.classList.add("show");
      }
    });
  </script>
</body>
</html>
