<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CONTECS — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(160deg, #045223 0%, #00722e 55%, #39b54a 100%);
      animation: none;
    }
    .login-box {
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 24px 64px rgba(4,82,35,0.22), 0 4px 16px rgba(0,0,0,0.08);
      padding: 44px 32px 40px;
      width: 100%;
      max-width: 390px;
      margin: 16px;
      text-align: center;
      animation: fadeSlideUp 0.45s cubic-bezier(0.4,0,0.2,1) both;
    }
    @keyframes fadeSlideUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .logo-circle {
      width: 76px; height: 76px;
      background: linear-gradient(135deg, #045223 0%, #00722e 100%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(0,114,46,0.32);
      font-size: 32px;
    }
    .login-box h2 {
      font-size: 26px;
      font-weight: 800;
      color: #00722e;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .subtitulo {
      font-size: 13px;
      color: #8a9e8d;
      margin-bottom: 32px;
      font-weight: 500;
    }
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content:''; flex:1; height:1px; background:#d0dbd2;
    }
    .divider span { font-size:12px; color:#8a9e8d; font-weight:500; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 15px 20px;
      border: 1.5px solid #d0dbd2; border-radius: 12px;
      background: #fff; font-size: 15px; font-weight: 600;
      color: #1a2e1e; cursor: pointer;
      transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
      min-height: 52px; font-family: 'Inter', sans-serif;
    }
    .btn-google:hover {
      border-color: #00722e;
      background: #f4f7f5;
      box-shadow: 0 4px 16px rgba(0,114,46,0.14);
      transform: translateY(-1px);
    }
    .btn-google:active { transform: scale(0.98); }
    .btn-google:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .nota { font-size: 12px; color: #aaa; margin-top: 24px; line-height: 1.6; font-weight: 500; }
    .nota strong { color: #00722e; }
    .alerta {
      padding: 11px 14px; border-radius: 10px; font-size: 13px;
      margin-bottom: 16px; display: none; text-align: left;
      line-height: 1.4; font-weight: 500; align-items: center; gap: 8px;
    }
    .alerta.show { display: flex; animation: fadeSlideUp 0.2s ease both; }
    .alerta-error  { background:#fdedec; color:#c0392b; border-left:4px solid #c0392b; }
    .alerta-aviso  { background:#fef9e7; color:#d4850a; border-left:4px solid #d4850a; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo-circle">🏛️</div>
    <h2>CONTECS</h2>
    <p class="subtitulo">Sistema de Gestión Organizacional</p>

    <div class="alerta alerta-error" id="msg-error"></div>
    <div class="alerta alerta-aviso" id="msg-aviso"></div>

    <div class="divider"><span>Inicia sesión con tu cuenta</span></div>

    <button class="btn-google" id="btn-google">
      <svg width="20" height="20" viewBox="0 0 48 48" style="flex-shrink:0">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continuar con Google
    </button>

    <p class="nota">Solo miembros de <strong>CONTECS</strong> pueden ingresar.<br>Tu acceso será activado por un administrador.</p>
  </div>

  <script type="module">
    import { loginConGoogle, guardRoute } from "./js/auth.js";

    guardRoute();

    const btn      = document.getElementById("btn-google");
    const msgError = document.getElementById("msg-error");
    const msgAviso = document.getElementById("msg-aviso");

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      btn.lastElementChild.textContent = " Conectando...";
      msgError.classList.remove("show");
      msgAviso.classList.remove("show");

      try {
        await loginConGoogle();
        const rol = sessionStorage.getItem("rol");
        if (rol === "sin_rol") {
          msgAviso.textContent = "Tu cuenta fue registrada. Un administrador te asignará un rol — entrarás automáticamente cuando esté listo.";
          msgAviso.classList.add("show");
          btn.disabled = false;
          btn.lastElementChild.textContent = " Continuar con Google";

          const uid = sessionStorage.getItem("uid");
          if (uid) {
            const { db } = await import("./js/firebase-config.js");
            const { doc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js");
            onSnapshot(doc(db, "usuarios", uid), (snap) => {
              if (!snap.exists()) return;
              const nuevoRol = snap.data().rol || "sin_rol";
              if (nuevoRol !== "sin_rol") {
                sessionStorage.setItem("rol", nuevoRol);
                window.location.href = "dashboard.html";
              }
            });
          }
          return;
        }
        window.location.href = "dashboard.html";
      } catch (e) {
        btn.disabled = false;
        btn.lastElementChild.textContent = " Continuar con Google";
        if (e.code === "auth/popup-closed-by-user") return;
        if (e.code === "auth/popup-blocked") {
          msgError.textContent = "El navegador bloqueó la ventana emergente. Permite popups e intenta de nuevo.";
        } else {
          msgError.textContent = "Error al iniciar sesión. Intenta de nuevo.";
        }
        msgError.classList.add("show");
      }
    });
  </script>
</body>
</html>
