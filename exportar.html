<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CONTECS — Exportar PDF</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    .tipo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tipo-opt {
      border: 2px solid var(--gris-borde);
      border-radius: var(--radio);
      padding: 14px 12px;
      text-align: center;
      cursor: pointer;
      background: #fff;
      user-select: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .tipo-opt:hover { border-color: var(--verde-claro); background: var(--gris-suave); }
    .tipo-opt.seleccionado { border-color: var(--verde); background: var(--verde-fondo); }
    .tipo-opt .t-icono { font-size: 24px; margin-bottom: 6px; }
    .tipo-opt .t-label { font-size: 13px; font-weight: 600; color: var(--gris-texto); }
    .tipo-opt.seleccionado .t-label { color: var(--verde-oscuro); }

    .fechas-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .fechas-row .form-group { margin-bottom: 0; }

    .preview-card {
      background: var(--gris-suave);
      border-radius: var(--radio-sm);
      padding: 14px;
      font-size: 13px;
      color: var(--gris-medio);
      margin-top: 16px;
      border: 1px solid var(--gris-borde);
      display: none;
    }
    .preview-card.show { display: block; }
    .preview-card strong { color: var(--gris-texto); }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>📤 Exportar PDF</h1>
    <a href="dashboard.html" style="color:#fff;font-size:13px;">← Volver</a>
  </div>

  <div class="container">
    <div class="seccion-titulo">Exportar datos a PDF</div>

    <div class="card">
      <div class="card-title">¿Qué deseas exportar?</div>

      <div class="tipo-grid" id="tipo-grid">
        <div class="tipo-opt seleccionado" data-tipo="ventas">
          <div class="t-icono">🧾</div>
          <div class="t-label">Ventas</div>
        </div>
        <div class="tipo-opt" data-tipo="compras">
          <div class="t-icono">🛒</div>
          <div class="t-label">Compras</div>
        </div>
        <div class="tipo-opt" data-tipo="inventario">
          <div class="t-icono">📦</div>
          <div class="t-label">Inventario</div>
        </div>
        <div class="tipo-opt" data-tipo="mermas">
          <div class="t-icono">⚠️</div>
          <div class="t-label">Mermas</div>
        </div>
      </div>

      <div class="fechas-row">
        <div class="form-group">
          <label for="fecha-inicio">Fecha inicio</label>
          <input type="date" id="fecha-inicio"/>
        </div>
        <div class="form-group">
          <label for="fecha-fin">Fecha fin</label>
          <input type="date" id="fecha-fin"/>
        </div>
      </div>

      <button class="btn btn-primary" id="btn-exportar" style="width:100%;">
        ⬇️ Exportar PDF
      </button>

      <div class="alerta alerta-error"   id="alerta-error"></div>
      <div class="alerta alerta-success" id="alerta-ok"></div>

      <div class="preview-card" id="preview-card">
        <strong>📄 PDF generado:</strong> <span id="preview-nombre">—</span><br/>
        <span id="preview-filas">—</span> registros exportados.
      </div>
    </div>
  </div>

  <!-- jsPDF + AutoTable via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <script type="module">
    import { guardRoute, requirePermiso } from "./js/auth.js";
    import { formatearMoneda } from "./js/operaciones.js";
    import { db } from "./js/firebase-config.js";
    import {
      collection, query, where, orderBy, getDocs
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    guardRoute();
    requirePermiso("exportar_datos");

    // ── Helpers ───────────────────────────────────────────────────────────────
    function toInputDate(d) { return d.toISOString().split("T")[0]; }
    function formatearFecha(ts) {
      if (!ts) return "—";
      const f = ts.toDate ? ts.toDate() : new Date(ts);
      return f.toLocaleDateString("es-PA", {
        day: "2-digit", month: "short", year: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    }

    // Defaults mes actual
    const hoy      = new Date();
    const primero  = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
    const ultimo   = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0);
    document.getElementById("fecha-inicio").value = toInputDate(primero);
    document.getElementById("fecha-fin").value    = toInputDate(ultimo);

    // ── Tipo seleccionado ─────────────────────────────────────────────────────
    let tipoSeleccionado = "ventas";

    document.getElementById("tipo-grid").addEventListener("click", e => {
      const opt = e.target.closest(".tipo-opt");
      if (!opt) return;
      document.querySelectorAll(".tipo-opt").forEach(o => o.classList.remove("seleccionado"));
      opt.classList.add("seleccionado");
      tipoSeleccionado = opt.dataset.tipo;
      ocultarAlertas();
      document.getElementById("preview-card").classList.remove("show");
    });

    // ── Alertas ───────────────────────────────────────────────────────────────
    const alertaError = document.getElementById("alerta-error");
    const alertaOk    = document.getElementById("alerta-ok");
    function mostrarError(msg) { alertaError.textContent = msg; alertaError.classList.add("show"); alertaOk.classList.remove("show"); }
    function mostrarOk(msg)    { alertaOk.textContent = msg;    alertaOk.classList.add("show");    alertaError.classList.remove("show"); }
    function ocultarAlertas()  { alertaError.classList.remove("show"); alertaOk.classList.remove("show"); }

    // ── PDF builder ───────────────────────────────────────────────────────────
    function crearPDF(titulo, subtitulo, columnas, filas, notasFondos = []) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });

      const verde    = [0, 114, 46];
      const gris     = [100, 100, 100];
      const grisSuave = [240, 247, 242];
      const negro    = [26, 46, 30];

      const ancho = doc.internal.pageSize.getWidth();
      let y = 14;

      // ── Encabezado ──
      doc.setFillColor(...verde);
      doc.rect(0, 0, ancho, 20, "F");
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(14);
      doc.setFont("helvetica", "bold");
      doc.text("CONTECS — Sistema de Gestión", 14, 12);
      doc.setFontSize(9);
      doc.setFont("helvetica", "normal");
      doc.text(new Date().toLocaleDateString("es-PA", { day: "2-digit", month: "short", year: "numeric" }), ancho - 14, 12, { align: "right" });

      y = 28;
      doc.setTextColor(...negro);
      doc.setFontSize(13);
      doc.setFont("helvetica", "bold");
      doc.text(titulo, 14, y);
      y += 6;
      doc.setFontSize(9);
      doc.setFont("helvetica", "normal");
      doc.setTextColor(...gris);
      doc.text(subtitulo, 14, y);
      y += 8;

      // ── Tabla ──
      doc.autoTable({
        startY: y,
        head: [columnas],
        body: filas,
        theme: "grid",
        styles: {
          fontSize: 8,
          cellPadding: 3,
          textColor: negro,
          lineColor: [208, 219, 210],
          lineWidth: 0.3,
        },
        headStyles: {
          fillColor: verde,
          textColor: [255, 255, 255],
          fontStyle: "bold",
          fontSize: 8,
          halign: "left",
        },
        alternateRowStyles: {
          fillColor: grisSuave,
        },
        margin: { left: 14, right: 14 },
        didDrawPage: (data) => {
          // Pie de página
          const totalPags = doc.internal.getNumberOfPages();
          const pag = doc.internal.getCurrentPageInfo().pageNumber;
          doc.setFontSize(8);
          doc.setTextColor(...gris);
          const alto = doc.internal.pageSize.getHeight();
          doc.text(`Página ${pag} de ${totalPags}`, ancho / 2, alto - 8, { align: "center" });
          doc.text("CONTECS — Generado automáticamente", 14, alto - 8);
        },
      });

      // ── Notas al pie (facturas, motivos, etc.) ──
      if (notasFondos.length > 0) {
        let finalY = doc.lastAutoTable.finalY + 6;
        const alto = doc.internal.pageSize.getHeight();

        if (finalY + notasFondos.length * 5 + 10 > alto - 15) {
          doc.addPage();
          finalY = 20;
        }

        doc.setFillColor(...grisSuave);
        doc.setDrawColor(...verde);
        doc.roundedRect(14, finalY, ancho - 28, notasFondos.length * 5.5 + 8, 2, 2, "FD");
        doc.setTextColor(...negro);
        doc.setFontSize(8);
        doc.setFont("helvetica", "bold");
        doc.text("📎 Notas adicionales:", 18, finalY + 5.5);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(...gris);
        notasFondos.forEach((nota, i) => {
          doc.text(`• ${nota}`, 18, finalY + 10 + i * 5.5);
        });
      }

      return doc;
    }

    // ── Exportar ──────────────────────────────────────────────────────────────
    const btnExportar = document.getElementById("btn-exportar");

    btnExportar.addEventListener("click", async () => {
      ocultarAlertas();
      document.getElementById("preview-card").classList.remove("show");

      const inicioStr = document.getElementById("fecha-inicio").value;
      const finStr    = document.getElementById("fecha-fin").value;
      if (!inicioStr || !finStr) { mostrarError("Selecciona ambas fechas."); return; }

      const inicio = new Date(inicioStr); inicio.setHours(0, 0, 0, 0);
      const fin    = new Date(finStr);    fin.setHours(23, 59, 59, 999);
      if (inicio > fin) { mostrarError("La fecha inicio no puede ser mayor que la fecha fin."); return; }

      btnExportar.disabled    = true;
      btnExportar.textContent = "⏳ Generando PDF...";

      const periodoLabel = `Período: ${new Date(inicioStr).toLocaleDateString("es-PA", { day:"2-digit", month:"short", year:"numeric" })} → ${new Date(finStr).toLocaleDateString("es-PA", { day:"2-digit", month:"short", year:"numeric" })}`;

      try {
        let pdfDoc, nombreArchivo, totalRegistros;

        // ════ VENTAS ════
        if (tipoSeleccionado === "ventas") {
          const snap = await getDocs(query(
            collection(db, "ventas"),
            where("creadoEn", ">=", inicio),
            where("creadoEn", "<=", fin),
            orderBy("creadoEn", "asc")
          ));

          const columnas = ["Fecha", "Usuario", "Producto", "Cant.", "P/U", "Subtotal", "Total venta", "Método pago"];
          const filas = [], notas = [];
          let conteo = 0;

          snap.forEach(d => {
            const v = d.data();
            const items = v.items || [];
            if (items.length === 0) {
              filas.push([formatearFecha(v.creadoEn), v.usuarioNombre || "—", "—", "—", "—", "—", formatearMoneda(v.total ?? 0), v.metodoPago || "—"]);
              conteo++;
            } else {
              items.forEach((it, i) => {
                filas.push([
                  i === 0 ? formatearFecha(v.creadoEn) : "",
                  i === 0 ? (v.usuarioNombre || "—") : "",
                  it.nombre || "—",
                  String(it.cantidad ?? 0),
                  formatearMoneda(it.precioUnitario ?? 0),
                  formatearMoneda(it.subtotal ?? 0),
                  i === 0 ? formatearMoneda(v.total ?? 0) : "",
                  i === 0 ? (v.metodoPago || "—") : "",
                ]);
              });
              conteo++;
            }
            if (v.nota) notas.push(`Nota en venta (${formatearFecha(v.creadoEn)}): "${v.nota}"`);
          });

          if (conteo === 0) { mostrarError("No hay ventas en el período seleccionado."); return; }
          totalRegistros = conteo;
          pdfDoc = crearPDF("Reporte de Ventas", periodoLabel, columnas, filas, notas);
          nombreArchivo = `contecs-ventas-${inicioStr}-al-${finStr}.pdf`;
        }

        // ════ COMPRAS ════
        else if (tipoSeleccionado === "compras") {
          const snap = await getDocs(query(
            collection(db, "compras"),
            where("creadoEn", ">=", inicio),
            where("creadoEn", "<=", fin),
            orderBy("creadoEn", "asc")
          ));

          const columnas = ["Fecha", "Usuario", "Proveedor", "Producto", "Cant.", "P/U", "Subtotal", "Total compra", "Método pago"];
          const filas = [], notas = [];
          let conteo = 0;

          snap.forEach(d => {
            const c = d.data();
            const items = c.items || [];
            if (items.length === 0) {
              filas.push([formatearFecha(c.creadoEn), c.usuarioNombre || "—", c.proveedor || "—", "—", "—", "—", "—", formatearMoneda(c.total ?? 0), c.metodoPago || "—"]);
              conteo++;
            } else {
              items.forEach((it, i) => {
                filas.push([
                  i === 0 ? formatearFecha(c.creadoEn) : "",
                  i === 0 ? (c.usuarioNombre || "—") : "",
                  i === 0 ? (c.proveedor || "—") : "",
                  it.nombre || "—",
                  String(it.cantidad ?? 0),
                  formatearMoneda(it.precioUnitario ?? 0),
                  formatearMoneda(it.subtotal ?? 0),
                  i === 0 ? formatearMoneda(c.total ?? 0) : "",
                  i === 0 ? (c.metodoPago || "—") : "",
                ]);
              });
              conteo++;
            }
            if (c.nota) notas.push(`Nota en compra (${formatearFecha(c.creadoEn)}): "${c.nota}"`);
            if (c.factura?.url) notas.push(`Factura de compra ${formatearFecha(c.creadoEn)} (prov. ${c.proveedor || "—"}): ${c.factura.url}`);
          });

          if (conteo === 0) { mostrarError("No hay compras en el período seleccionado."); return; }
          totalRegistros = conteo;
          pdfDoc = crearPDF("Reporte de Compras", periodoLabel, columnas, filas, notas);
          nombreArchivo = `contecs-compras-${inicioStr}-al-${finStr}.pdf`;
        }

        // ════ INVENTARIO ════
        else if (tipoSeleccionado === "inventario") {
          const snap = await getDocs(query(
            collection(db, "movimientos_inventario"),
            where("creadoEn", ">=", inicio),
            where("creadoEn", "<=", fin),
            orderBy("creadoEn", "asc")
          ));

          const columnas = ["Fecha", "Tipo", "Producto", "Cant.", "Stock anterior", "Stock posterior", "Origen", "Motivo"];
          const filas = [];
          let conteo = 0;

          snap.forEach(d => {
            const m = d.data();
            const origenMap = { venta: "Venta", compra: "Compra", ajuste: "Ajuste", merma: "Merma" };
            filas.push([
              formatearFecha(m.creadoEn),
              m.tipo === "entrada" ? "Entrada ▲" : "Salida ▼",
              m.nombre || "—",
              String(m.cantidad ?? 0),
              String(m.antes ?? "?"),
              String(m.despues ?? "?"),
              origenMap[m.origen] || m.origen || "—",
              m.motivo || "—",
            ]);
            conteo++;
          });

          if (conteo === 0) { mostrarError("No hay movimientos de inventario en el período."); return; }
          totalRegistros = conteo;

          const nota = ["Este reporte muestra todos los movimientos de stock del período. "
            + "\"Entrada\" = producto que ingresó al inventario. \"Salida\" = producto que salió. "
            + "Stock anterior y posterior reflejan el estado del producto en ese momento exacto."];

          pdfDoc = crearPDF("Reporte de Inventario", periodoLabel, columnas, filas, nota);
          nombreArchivo = `contecs-inventario-${inicioStr}-al-${finStr}.pdf`;
        }

        // ════ MERMAS ════
        else if (tipoSeleccionado === "mermas") {
          const snap = await getDocs(query(
            collection(db, "mermas"),
            where("creadoEn", ">=", inicio),
            where("creadoEn", "<=", fin),
            orderBy("creadoEn", "asc")
          ));

          const columnas = ["Fecha", "Usuario", "Producto", "Cantidad mermada", "Motivo"];
          const filas = [];
          let conteo = 0;

          snap.forEach(d => {
            const m = d.data();
            const items = m.items || [];
            if (items.length === 0) {
              filas.push([formatearFecha(m.creadoEn), m.usuarioNombre || "—", "—", "—", m.motivo || "—"]);
              conteo++;
            } else {
              items.forEach((it, i) => {
                filas.push([
                  i === 0 ? formatearFecha(m.creadoEn) : "",
                  i === 0 ? (m.usuarioNombre || "—") : "",
                  it.nombre || "—",
                  String(it.cantidad ?? 0),
                  i === 0 ? (m.motivo || "—") : "",
                ]);
              });
              conteo++;
            }
          });

          if (conteo === 0) { mostrarError("No hay mermas en el período seleccionado."); return; }
          totalRegistros = conteo;

          const nota = ["Las mermas son pérdidas de producto que NO generan ingreso de fondos. "
            + "El inventario se descuenta automáticamente al registrar una merma. "
            + "Cada registro incluye el motivo de la pérdida indicado por el usuario."];

          pdfDoc = crearPDF("Reporte de Mermas", periodoLabel, columnas, filas, nota);
          nombreArchivo = `contecs-mermas-${inicioStr}-al-${finStr}.pdf`;
        }

        // ── Descargar ──
        pdfDoc.save(nombreArchivo);

        document.getElementById("preview-nombre").textContent = nombreArchivo;
        document.getElementById("preview-filas").textContent  = `${totalRegistros} registro${totalRegistros > 1 ? "s" : ""}`;
        document.getElementById("preview-card").classList.add("show");
        mostrarOk(`✅ PDF generado con ${totalRegistros} registro${totalRegistros > 1 ? "s" : ""}. Revisa tus descargas.`);

      } catch (err) {
        console.error("Exportar PDF:", err);
        mostrarError("Error al generar el PDF: " + err.message);
      } finally {
        btnExportar.disabled    = false;
        btnExportar.textContent = "⬇️ Exportar PDF";
      }
    });
  </script>
</body>
</html>
