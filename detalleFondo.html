<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CONTECS — Detalle Fondo</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    /* ── Botón de volver estético ── */
    .btn-volver {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.55);
      color: #fff;
      font-size: 17px;
      font-weight: 900;
      text-decoration: none;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
      flex-shrink: 0;
      line-height: 1;
      cursor: pointer;
    }
    .btn-volver:hover {
      background: rgba(255,255,255,0.32);
      border-color: #fff;
      transform: scale(1.08);
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .kpi-item {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      box-shadow: var(--sombra-sm);
      border-left: 3px solid var(--verde-claro);
    }
    .kpi-item .lbl {
      font-size: 11px;
      color: var(--gris-medio);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }
    .kpi-item .val { font-size: 24px; font-weight: 800; color: var(--verde-oscuro); }
    .kpi-item.ingresos .val { color: var(--verde); }
    .kpi-item.egresos  .val { color: var(--rojo); }

    .filtros-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .filtros-acciones { display: flex; gap: 10px; flex-wrap: wrap; }

    .tabla-contable-wrap {
      overflow-x: auto;
      border-radius: 12px;
      box-shadow: var(--sombra-sm);
      background: #fff;
    }
    .tabla-contable {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
      font-size: 14px;
    }
    .tabla-contable th {
      background: var(--verde-fondo);
      color: var(--verde-oscuro);
      text-align: left;
      padding: 10px 12px;
      border-bottom: 2px solid var(--verde-claro);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .tabla-contable td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--gris-borde);
      vertical-align: top;
    }
    .tabla-contable tr:hover td { background: #f9fcfa; }
    .col-fecha   { white-space: nowrap; font-size: 12px; color: var(--gris-medio); }
    .col-mov     { font-weight: 700; color: var(--gris-texto); }
    .col-usuario { color: var(--gris-texto); font-size: 13px; }
    .col-ingreso { color: var(--verde); font-weight: 800; text-align: right; }
    .col-egreso  { color: var(--rojo);  font-weight: 800; text-align: right; }
    .th-right    { text-align: right; }
    .fila-totales td {
      font-weight: 800;
      background: #f2faf5;
      border-top: 2px solid var(--verde-claro);
      border-bottom: none;
    }
    .fila-totales .label-total { color: var(--verde-oscuro); }
    .fila-totales .total-in    { color: var(--verde); text-align: right; }
    .fila-totales .total-out   { color: var(--rojo);  text-align: right; }

    @media (min-width: 740px) {
      .kpi-grid { grid-template-columns: repeat(3, 1fr); }
      .filtros-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Detalle Fondo</h1>
    <a href="fondos.html" class="btn-volver" title="Volver">&#8592;</a>
  </div>

  <div class="container">
    <div class="alerta alerta-error" id="detalle-error"></div>

    <!-- KPIs -->
    <div class="card">
      <div class="card-title">Resumen contable</div>
      <div class="kpi-grid">
        <div class="kpi-item">
          <div class="lbl">Balance total</div>
          <div class="val" id="kpi-balance">$0.00</div>
        </div>
        <div class="kpi-item ingresos">
          <div class="lbl">Ingresos totales</div>
          <div class="val" id="kpi-ingresos">$0.00</div>
        </div>
        <div class="kpi-item egresos">
          <div class="lbl">Egresos totales</div>
          <div class="val" id="kpi-egresos">$0.00</div>
        </div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="card">
      <div class="card-title">Filtros</div>
      <div class="filtros-grid">
        <div class="form-group">
          <label for="filtro-tipo">Tipo</label>
          <select id="filtro-tipo">
            <option value="todos">Todos</option>
            <option value="ingreso">Ingresos</option>
            <option value="salida">Egresos</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filtro-usuario">Usuario</label>
          <select id="filtro-usuario">
            <option value="todos">Todos</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filtro-desde">Desde</label>
          <input id="filtro-desde" type="date"/>
        </div>
        <div class="form-group">
          <label for="filtro-hasta">Hasta</label>
          <input id="filtro-hasta" type="date"/>
        </div>
      </div>
      <div class="filtros-acciones">
        <button type="button" class="btn btn-outline btn-sm" id="btn-limpiar-filtros">
          Limpiar filtros
        </button>
      </div>
    </div>

    <!-- Tabla -->
    <div class="card">
      <div class="card-title">Libro de movimientos</div>
      <div class="tabla-contable-wrap">
        <table class="tabla-contable">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Movimiento</th>
              <th>Usuario</th>
              <th class="th-right">Ingresos</th>
              <th class="th-right">Egresos</th>
            </tr>
          </thead>
          <tbody id="detalle-body">
            <tr><td colspan="5" style="text-align:center;padding:20px;">
              <div class="spinner" style="margin:0 auto;"></div>
            </td></tr>
          </tbody>
          <tfoot>
            <tr class="fila-totales">
              <td colspan="3" class="label-total">Totales del filtro</td>
              <td class="total-in"  id="total-ingresos">$0.00</td>
              <td class="total-out" id="total-egresos">$0.00</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { guardRoute, requirePermiso } from "./js/auth.js";
    import { db } from "./js/firebase-config.js";
    import { formatearMoneda } from "./js/operaciones.js";
    import {
      doc, getDoc, collection, query, orderBy, onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    guardRoute();
    requirePermiso("ver_fondos");

    const estado = { balance: 0, movimientos: [], filtrados: [] };
    const cacheUsuarios = new Map();
    const $ = (id) => document.getElementById(id);

    const errorEl       = $("detalle-error");
    const detalleBody   = $("detalle-body");
    const filtroTipo    = $("filtro-tipo");
    const filtroUsuario = $("filtro-usuario");
    const filtroDesde   = $("filtro-desde");
    const filtroHasta   = $("filtro-hasta");

    function mostrarError(msg) {
      errorEl.textContent = msg;
      errorEl.className = "alerta alerta-error show";
    }

    function fechaTexto(ts) {
      if (!ts?.toDate) return "—";
      return ts.toDate().toLocaleString("es-PA", {
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit",
      });
    }
    function fechaSolo(ts) {
      if (!ts?.toDate) return "";
      return ts.toDate().toISOString().slice(0, 10);
    }

    async function obtenerNombre(uid) {
      if (!uid) return "—";
      if (cacheUsuarios.has(uid)) return cacheUsuarios.get(uid);
      const snap = await getDoc(doc(db, "usuarios", uid));
      const nombre = snap.exists() ? (snap.data().nombre || uid) : uid;
      cacheUsuarios.set(uid, nombre);
      return nombre;
    }

    // ── Poblar select de usuarios dinámicamente ───────────────────────────────
    function actualizarSelectUsuarios() {
      const usuarios = [...new Set(
        estado.movimientos.map(m => m.usuarioNombre).filter(Boolean)
      )].sort((a, b) => a.localeCompare(b));

      const actual = filtroUsuario.value;
      filtroUsuario.innerHTML = '<option value="todos">Todos los usuarios</option>' +
        usuarios.map(u => `<option value="${u}">${u}</option>`).join("");
      if (usuarios.includes(actual)) filtroUsuario.value = actual;
    }

    // ── Filtros ───────────────────────────────────────────────────────────────
    function aplicarFiltros() {
      const tipo    = filtroTipo.value;
      const usuario = filtroUsuario.value;
      const desde   = filtroDesde.value;
      const hasta   = filtroHasta.value;

      estado.filtrados = estado.movimientos.filter(mov => {
        const fecha = fechaSolo(mov.creadoEn);
        if (tipo !== "todos" && mov.tipo !== tipo) return false;
        if (usuario !== "todos" && mov.usuarioNombre !== usuario) return false;
        if (desde && fecha && fecha < desde) return false;
        if (hasta && fecha && fecha > hasta) return false;
        return true;
      });

      renderTabla();
      renderKpis();
    }

    function limpiarFiltros() {
      filtroTipo.value    = "todos";
      filtroUsuario.value = "todos";
      filtroDesde.value   = "";
      filtroHasta.value   = "";
      aplicarFiltros();
    }

    [filtroTipo, filtroUsuario, filtroDesde, filtroHasta]
      .forEach(el => el.addEventListener("input", aplicarFiltros));
    $("btn-limpiar-filtros").addEventListener("click", limpiarFiltros);

    // ── Render KPIs ───────────────────────────────────────────────────────────
    function renderKpis() {
      let ingresos = 0, egresos = 0;
      estado.filtrados.forEach(m => {
        const monto = Number(m.monto || 0);
        if (m.tipo === "ingreso") ingresos += monto;
        else                      egresos  += monto;
      });
      $("kpi-balance").textContent   = formatearMoneda(estado.balance);
      $("kpi-ingresos").textContent  = formatearMoneda(ingresos);
      $("kpi-egresos").textContent   = formatearMoneda(egresos);
      $("total-ingresos").textContent = formatearMoneda(ingresos);
      $("total-egresos").textContent  = formatearMoneda(egresos);
    }

    // ── Render tabla ──────────────────────────────────────────────────────────
    function renderTabla() {
      if (estado.filtrados.length === 0) {
        detalleBody.innerHTML = `
          <tr>
            <td colspan="5" style="text-align:center;color:var(--gris-medio);padding:20px;">
              No hay movimientos para los filtros seleccionados.
            </td>
          </tr>`;
        return;
      }
      detalleBody.innerHTML = estado.filtrados.map(mov => {
        const ingreso = mov.tipo === "ingreso" ? formatearMoneda(mov.monto || 0) : "—";
        const egreso  = mov.tipo === "salida"  ? formatearMoneda(mov.monto || 0) : "—";
        return `
          <tr>
            <td class="col-fecha">${fechaTexto(mov.creadoEn)}</td>
            <td class="col-mov">${mov.titulo || mov.descripcion || "Movimiento"}</td>
            <td class="col-usuario">${mov.usuarioNombre || "—"}</td>
            <td class="col-ingreso">${ingreso}</td>
            <td class="col-egreso">${egreso}</td>
          </tr>`;
      }).join("");
    }

    // ── Firestore ─────────────────────────────────────────────────────────────
    onSnapshot(doc(db, "fondos", "principal"), snap => {
      estado.balance = Number(snap.exists() ? snap.data().balance || 0 : 0);
      renderKpis();
    });

    onSnapshot(
      query(collection(db, "fondos_entrada"), orderBy("creadoEn", "desc")),
      async snap => {
        try {
          const resueltos = await Promise.all(snap.docs.map(async d => {
            const m = { id: d.id, ...d.data() };
            if (!m.usuarioNombre) m.usuarioNombre = await obtenerNombre(m.usuarioId);
            return m;
          }));
          estado.movimientos = resueltos;
          actualizarSelectUsuarios();
          aplicarFiltros();
        } catch (err) {
          mostrarError(err.message || "No se pudo cargar el detalle.");
        }
      }
    );
  </script>
</body>
</html>
